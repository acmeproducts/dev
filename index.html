<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Repo File Index</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0b1020;
      --bg-soft: #151b2f;
      --text: #e8ecff;
      --muted: #9aa6d1;
      --accent: #6ea8ff;
      --border: #2d3658;
      --good: #4bc58a;
      --warn: #ffb454;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f8ff;
        --bg-soft: #ffffff;
        --text: #111827;
        --muted: #59627a;
        --accent: #1f6feb;
        --border: #d4def8;
        --good: #0f8a55;
        --warn: #9a5b00;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    main {
      max-width: 1050px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
    }

    .subtitle {
      margin: 0 0 16px;
      color: var(--muted);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-bottom: 16px;
    }

    input,
    button {
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-soft);
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.95rem;
    }

    button {
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      border-color: var(--accent);
    }

    .status {
      margin-bottom: 12px;
      color: var(--muted);
      min-height: 1.2em;
    }

    .status.error {
      color: #ff6b6b;
    }

    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: auto;
      background: var(--bg-soft);
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 720px;
    }

    th,
    td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    th {
      background: color-mix(in srgb, var(--bg-soft), var(--accent) 8%);
      position: sticky;
      top: 0;
      z-index: 1;
      user-select: none;
      cursor: pointer;
      white-space: nowrap;
    }

    th:hover {
      color: var(--accent);
    }

    tbody tr:hover {
      background: color-mix(in srgb, var(--bg-soft), var(--accent) 6%);
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.88rem;
      word-break: break-word;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .tag {
      color: var(--good);
      font-size: 0.82rem;
      border: 1px solid currentColor;
      border-radius: 999px;
      padding: 1px 8px;
      margin-left: 6px;
    }

    .small {
      color: var(--muted);
      font-size: 0.82rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>GitHub Repo File Index</h1>
    <p class="subtitle">Enter <span class="mono">owner/repo</span>, <span class="mono">github.owner/repo</span>, or a GitHub URL.</p>

    <div class="controls">
      <input id="repoInput" placeholder="e.g. octocat/Hello-World" autocomplete="off" />
      <button id="loadBtn">Load</button>
    </div>

    <div id="status" class="status">Ready.</div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-key="path">Name</th>
            <th data-key="date">Date</th>
            <th data-key="size">Size</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr>
            <td colspan="4" class="small">No repository loaded yet.</td>
          </tr>
        </tbody>
      </table>
    </div>
    <p class="small" id="meta"></p>
  </main>

  <script>
    const repoInput = document.getElementById('repoInput');
    const loadBtn = document.getElementById('loadBtn');
    const statusEl = document.getElementById('status');
    const tbody = document.getElementById('tbody');
    const meta = document.getElementById('meta');

    const MAX_DATE_LOOKUPS = 120;
    const DATE_CONCURRENCY = 6;

    let sortBy = 'path';
    let sortDir = 'asc';
    let files = [];
    let currentRepo = null;

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle('error', isError);
    }

    function parseRepoInput(raw) {
      if (!raw) return null;
      const value = raw.trim().replace(/^https?:\/\//i, '').replace(/^www\./i, '');

      if (/^github\.[^/]+\/.+$/i.test(value)) {
        const parts = value.replace(/^github\./i, '').split('/').filter(Boolean);
        return parts.length >= 2 ? { owner: parts[0], repo: parts[1] } : null;
      }

      if (/^github\.com\//i.test(value)) {
        const parts = value.replace(/^github\.com\//i, '').split('/').filter(Boolean);
        return parts.length >= 2 ? { owner: parts[0], repo: parts[1] } : null;
      }

      const simple = value.split('/').filter(Boolean);
      if (simple.length >= 2) {
        return { owner: simple[0], repo: simple[1] };
      }

      return null;
    }

    function formatBytes(bytes) {
      if (!Number.isFinite(bytes)) return '—';
      if (bytes < 1024) return `${bytes} B`;
      const units = ['KB', 'MB', 'GB'];
      let size = bytes / 1024;
      let unitIndex = 0;
      while (size >= 1024 && unitIndex < units.length - 1) {
        size /= 1024;
        unitIndex += 1;
      }
      return `${size.toFixed(size < 10 ? 1 : 0)} ${units[unitIndex]}`;
    }

    function formatDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      if (Number.isNaN(d.valueOf())) return '—';
      return d.toLocaleString();
    }

    function isHtmlFile(path) {
      return /\.html?$/i.test(path);
    }

    function sortFiles() {
      const dir = sortDir === 'asc' ? 1 : -1;
      files.sort((a, b) => {
        if (sortBy === 'size') {
          return ((a.size || -1) - (b.size || -1)) * dir;
        }
        if (sortBy === 'date') {
          const ad = a.date ? new Date(a.date).valueOf() : 0;
          const bd = b.date ? new Date(b.date).valueOf() : 0;
          return (ad - bd) * dir;
        }
        return a.path.localeCompare(b.path) * dir;
      });
    }

    function renderTable() {
      tbody.innerHTML = '';

      if (!files.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="small">No files found in this repository tree.</td></tr>';
        return;
      }

      const frag = document.createDocumentFragment();
      for (const file of files) {
        const tr = document.createElement('tr');
        const safePath = file.path.replace(/"/g, '&quot;');
        const fileUrl = `https://github.com/${currentRepo.owner}/${currentRepo.repo}/blob/${currentRepo.branch}/${safePath}`;
        const launchUrl = `https://cdn.jsdelivr.net/gh/${currentRepo.owner}/${currentRepo.repo}@${currentRepo.branch}/${safePath}`;

        tr.innerHTML = `
          <td class="mono">${file.path}${isHtmlFile(file.path) ? '<span class="tag">HTML</span>' : ''}</td>
          <td>${formatDate(file.date)}</td>
          <td>${formatBytes(file.size)}</td>
          <td>
            <a href="${fileUrl}" target="_blank" rel="noopener">GitHub</a>
            ${isHtmlFile(file.path)
              ? ` · <a href="${launchUrl}" target="_blank" rel="noopener">Launch</a>`
              : ''}
          </td>
        `;
        frag.appendChild(tr);
      }

      tbody.appendChild(frag);
      meta.textContent = `Files: ${files.length}. Sort: ${sortBy} (${sortDir}).`;
    }

    async function fetchJSON(url) {
      const response = await fetch(url, {
        headers: {
          Accept: 'application/vnd.github+json',
        },
      });
      if (!response.ok) {
        const message = await response.text();
        throw new Error(`GitHub API ${response.status}: ${message.slice(0, 120)}`);
      }
      return response.json();
    }

    async function fetchFileDates(owner, repo, paths) {
      const queue = [...paths];
      const updates = new Map();

      const worker = async () => {
        while (queue.length) {
          const path = queue.shift();
          try {
            const encoded = encodeURIComponent(path).replace(/%2F/g, '/');
            const commits = await fetchJSON(`https://api.github.com/repos/${owner}/${repo}/commits?path=${encoded}&per_page=1`);
            const date = commits?.[0]?.commit?.committer?.date || commits?.[0]?.commit?.author?.date || null;
            if (date) updates.set(path, date);
          } catch {
            // Ignore individual path lookup failures.
          }
        }
      };

      await Promise.all(Array.from({ length: DATE_CONCURRENCY }, worker));
      return updates;
    }

    async function loadRepo(owner, repo) {
      currentRepo = { owner, repo, branch: 'main' };
      setStatus(`Loading ${owner}/${repo} ...`);
      tbody.innerHTML = '<tr><td colspan="4" class="small">Loading file tree...</td></tr>';
      meta.textContent = '';

      try {
        const repoInfo = await fetchJSON(`https://api.github.com/repos/${owner}/${repo}`);
        currentRepo.branch = repoInfo.default_branch || 'main';

        const treeData = await fetchJSON(`https://api.github.com/repos/${owner}/${repo}/git/trees/${currentRepo.branch}?recursive=1`);
        const blobs = (treeData.tree || []).filter((item) => item.type === 'blob');

        files = blobs.map((item) => ({
          path: item.path,
          size: Number.isFinite(item.size) ? item.size : null,
          date: null,
        }));

        sortFiles();
        renderTable();

        const dateTargets = files.slice(0, MAX_DATE_LOOKUPS).map((f) => f.path);
        if (dateTargets.length) {
          setStatus(`Loaded ${files.length} files. Fetching dates for first ${dateTargets.length} files...`);
          const dateMap = await fetchFileDates(owner, repo, dateTargets);
          files = files.map((f) => ({ ...f, date: dateMap.get(f.path) || f.date }));
          sortFiles();
          renderTable();
          const missing = Math.max(0, files.length - dateTargets.length);
          setStatus(
            missing
              ? `Loaded ${files.length} files from ${owner}/${repo}. Dates fetched for ${dateTargets.length}; ${missing} left as unknown.`
              : `Loaded ${files.length} files from ${owner}/${repo}.`
          );
        } else {
          setStatus(`Loaded ${files.length} files from ${owner}/${repo}.`);
        }
      } catch (error) {
        console.error(error);
        files = [];
        renderTable();
        setStatus(`Failed to load ${owner}/${repo}. ${error.message}`, true);
      }
    }

    document.querySelectorAll('th[data-key]').forEach((th) => {
      th.addEventListener('click', () => {
        const key = th.dataset.key;
        if (sortBy === key) {
          sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          sortBy = key;
          sortDir = key === 'path' ? 'asc' : 'desc';
        }
        sortFiles();
        renderTable();
      });
    });

    async function handleLoad() {
      const parsed = parseRepoInput(repoInput.value);
      if (!parsed) {
        setStatus('Use owner/repo, github.owner/repo, or a full GitHub URL.', true);
        return;
      }

      const repoText = `${parsed.owner}/${parsed.repo}`;
      const url = new URL(window.location.href);
      url.searchParams.set('repo', repoText);
      history.replaceState({}, '', url);
      await loadRepo(parsed.owner, parsed.repo);
    }

    loadBtn.addEventListener('click', handleLoad);
    repoInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') handleLoad();
    });

    const initial = new URLSearchParams(window.location.search).get('repo');
    if (initial) {
      repoInput.value = initial;
      const parsed = parseRepoInput(initial);
      if (parsed) loadRepo(parsed.owner, parsed.repo);
    }
  </script>
</body>
</html>
