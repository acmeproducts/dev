<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repo List Redirector</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #60a5fa;
      --border: #334155;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8fafc;
        --panel: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --accent: #2563eb;
        --border: #cbd5e1;
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(680px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }

    h1 { margin: 0 0 10px; font-size: 1.35rem; }
    p { margin: 0 0 12px; color: var(--muted); }

    form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 12px;
    }

    input, button {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.95rem;
    }

    button {
      cursor: pointer;
      font-weight: 600;
      border-color: color-mix(in srgb, var(--accent), var(--border) 30%);
    }

    a { color: var(--accent); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .status { margin-top: 10px; min-height: 1.2em; }
  </style>
</head>
<body>
  <section class="card">
    <h1>Repo List Redirector</h1>
    <p>This entrypoint forwards to <span class="mono">username.github.io/repo/repolist.html</span>.</p>
    <p>Accepted formats: <span class="mono">owner/repo</span>, <span class="mono">github.owner/repo</span>, or <span class="mono">github.com/owner/repo</span>.</p>

    <form id="form">
      <input id="repoInput" placeholder="owner/repo" autocomplete="off" />
      <button type="submit">Open repolist.html</button>
    </form>

    <div id="status" class="status"></div>
  </section>

  <script>
    const form = document.getElementById('form');
    const repoInput = document.getElementById('repoInput');
    const statusEl = document.getElementById('status');

    function setStatus(message) {
      statusEl.innerHTML = message;
    }

    function parseRepo(value) {
      if (!value) return null;
      const cleaned = value.trim().replace(/^https?:\/\//i, '').replace(/^www\./i, '');

      if (/^github\.[^/]+\/.+$/i.test(cleaned)) {
        const [owner, repo] = cleaned.replace(/^github\./i, '').split('/');
        return owner && repo ? { owner, repo } : null;
      }

      if (/^github\.com\//i.test(cleaned)) {
        const parts = cleaned.replace(/^github\.com\//i, '').split('/').filter(Boolean);
        return parts.length >= 2 ? { owner: parts[0], repo: parts[1] } : null;
      }

      const parts = cleaned.split('/').filter(Boolean);
      return parts.length >= 2 ? { owner: parts[0], repo: parts[1] } : null;
    }

    function buildTarget(owner, repo) {
      return `https://${owner}.github.io/${repo}/repolist.html`;
    }

    function detectFromLocation() {
      const host = window.location.hostname;
      const pathParts = window.location.pathname.split('/').filter(Boolean);

      const repoParam = new URLSearchParams(window.location.search).get('repo');
      if (repoParam) return parseRepo(repoParam);

      if (/^github\.[^.]+$/i.test(host) && pathParts.length >= 1) {
        const owner = host.replace(/^github\./i, '');
        return { owner, repo: pathParts[0] };
      }

      if (host.toLowerCase() === 'github.com' && pathParts.length >= 2) {
        return { owner: pathParts[0], repo: pathParts[1] };
      }

      return null;
    }

    function goToRepoList(owner, repo) {
      const target = buildTarget(owner, repo);
      setStatus(`Redirecting to <a href="${target}">${target}</a> ...`);
      window.location.replace(target);
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const parsed = parseRepo(repoInput.value);
      if (!parsed) {
        setStatus('Invalid input. Use owner/repo, github.owner/repo, or github.com/owner/repo.');
        return;
      }
      goToRepoList(parsed.owner, parsed.repo);
    });

    const auto = detectFromLocation();
    if (auto) {
      repoInput.value = `${auto.owner}/${auto.repo}`;
      goToRepoList(auto.owner, auto.repo);
    } else {
      setStatus('Enter a repository to continue.');
    }
  </script>
</body>
</html>
