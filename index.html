<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repo Redirect</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; }
    .card { max-width: 760px; margin: 0 auto; }
    input, button { padding: 8px 10px; font-size: 14px; }
    input { width: 320px; max-width: 100%; }
    .muted { color: #666; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Repo Redirect</h1>
    <p class="muted">Redirects to <code>https://owner.github.io/repo/repolist.html</code>.</p>
    <form id="form">
      <input id="repoInput" placeholder="owner/repo or github.owner/repo" />
      <button type="submit">Open</button>
    </form>
    <p id="status" class="muted"></p>
  </div>

  <script>
    const input = document.getElementById('repoInput');
    const statusEl = document.getElementById('status');

    function parseRepo(raw) {
      if (!raw) return null;
      const value = raw.trim().replace(/^https?:\/\//i, '').replace(/^www\./i, '');
      if (/^github\.[^/]+\/.+$/i.test(value)) {
        const [owner, repo] = value.replace(/^github\./i, '').split('/');
        return owner && repo ? { owner, repo } : null;
      }
      if (/^github\.com\//i.test(value)) {
        const parts = value.replace(/^github\.com\//i, '').split('/').filter(Boolean);
        return parts.length >= 2 ? { owner: parts[0], repo: parts[1] } : null;
      }
      const simple = value.split('/').filter(Boolean);
      return simple.length >= 2 ? { owner: simple[0], repo: simple[1] } : null;
    }

    function detectFromLocation() {
      const host = location.hostname;
      const path = location.pathname.split('/').filter(Boolean);
      const qp = new URLSearchParams(location.search).get('repo');
      if (qp) return parseRepo(qp);
      if (/^github\.[^.]+$/i.test(host) && path.length >= 1) {
        return { owner: host.replace(/^github\./i, ''), repo: path[0] };
      }
      if (host.toLowerCase() === 'github.com' && path.length >= 2) {
        return { owner: path[0], repo: path[1] };
      }
      return null;
    }

    function go(owner, repo) {
      const target = `https://${owner}.github.io/${repo}/repolist.html`;
      statusEl.innerHTML = `Redirecting to <a href="${target}">${target}</a> ...`;
      location.replace(target);
    }

    document.getElementById('form').addEventListener('submit', (event) => {
      event.preventDefault();
      const parsed = parseRepo(input.value);
      if (!parsed) {
        statusEl.textContent = 'Invalid repo format.';
        return;
      }
      go(parsed.owner, parsed.repo);
    });

    const auto = detectFromLocation();
    if (auto) {
      input.value = `${auto.owner}/${auto.repo}`;
      go(auto.owner, auto.repo);
    }
  </script>
</body>
</html>
