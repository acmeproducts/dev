<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MAD Horizons v1.2</title>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: Arial, sans-serif; overflow: hidden; }
    .controls { padding: 10px; background: #111; display: flex; align-items: center; gap: 10px; }
    button, select { background: #333; color: white; border: none; padding: 8px 12px; cursor: pointer; }
    label { color: #ccc; display: flex; align-items: center; gap: 6px; }
    .panel-container { display: flex; flex-direction: column; height: calc(100vh - 100px); overflow-y: auto; }
    .panel { flex: none; height: 350px; border-bottom: 1px solid #444; position: relative; padding: 5px; }
    .label { font-size: 18px; padding: 5px 10px; }
    canvas { width: 100%; height: 300px; background: black; }
    .status { height: 40px; background: #222; color: #0f0; font-size: 16px; padding: 8px 12px; }
  </style>
</head>
<body>
  <div class="controls">
    <button onclick="startCapture()">Start</button>
    <button onclick="stopCapture()">Stop</button>
    <button onclick="clearData()">Clear</button>
    <button onclick="downloadRaw()">Download Raw Data</button>
    <label>View
      <select id="viewMode" onchange="setViewMode(this.value)">
        <option value="level">Level</option>
        <option value="range">Range</option>
        <option value="shape">Shape</option>
        <option value="trend">Trend</option>
      </select>
    </label>
  </div>
  <div class="status" id="status">Idle</div>
  <div class="panel-container">
    <div class="panel"><div class="label">1 Minute Horizon</div><canvas id="canvas1"></canvas></div>
    <div class="panel"><div class="label">10 Minute Horizon</div><canvas id="canvas2"></canvas></div>
    <div class="panel"><div class="label">1 Hour Horizon</div><canvas id="canvas3"></canvas></div>
    <div class="panel"><div class="label">8 Hour Horizon</div><canvas id="canvas4"></canvas></div>
    <div class="panel"><div class="label">24 Hour Horizon</div><canvas id="canvas5"></canvas></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const analyser = audioCtx.createAnalyser();
analyser.fftSize = 2048;
const bufferLength = analyser.frequencyBinCount;
const dataArray = new Uint8Array(bufferLength);
let streamSource, captureInterval, fullCapture = [];
const BAND_COUNT = 10;
const DATASET_COUNT = 10;
const PROFILE_POINTS = 10;
const ONE_SECOND_MS = 1000;
const ONE_MINUTE_MS = 60 * ONE_SECOND_MS;
const TEN_MINUTES_MS = 10 * ONE_MINUTE_MS;
const ONE_HOUR_MS = 60 * ONE_MINUTE_MS;
const EIGHT_HOURS_MS = 8 * ONE_HOUR_MS;
const DAY_MS = 24 * ONE_HOUR_MS;
const VIEW_LABELS = {
  level: 'Environmental noise level',
  range: 'Level with variation',
  shape: 'Compressed noise shape',
  trend: 'Absolute level with trend profile'
};
let viewMode = 'level';
const canvases = [1,2,3,4,5].map(n => document.getElementById('canvas'+n));
const charts = [];
const statusEl = document.getElementById('status');

function setStatus(msg, color = "#0f0") {
  statusEl.textContent = msg;
  statusEl.style.color = color;
}

function setViewMode(mode) {
  viewMode = mode;
  updatePanels();
  setStatus(`View: ${VIEW_LABELS[mode]}`, "#0ff");
}

function startCapture() {
  setStatus("Starting...");
  audioCtx.resume().then(() => {
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
      setStatus("Capturing Audio...");
      streamSource = audioCtx.createMediaStreamSource(stream);
      streamSource.connect(analyser);
      captureInterval = setInterval(captureSample, 1000);
    }).catch(err => {
      setStatus("Mic Denied: "+err.name, "#f00");
      alert("Microphone access denied: "+err.message);
    });
  });
}

function stopCapture() {
  clearInterval(captureInterval);
  if (streamSource) streamSource.disconnect();
  setStatus("Stopped", "#ff0");
}

function clearData() {
  stopCapture();
  fullCapture = [];
  clearDisplays();
  setStatus("Cleared", "#0ff");
}

function captureSample() {
  analyser.getByteFrequencyData(dataArray);
  const now = new Date();
  const bandData = Array.from({length: BAND_COUNT}, (_, i) => {
    const start = Math.floor(i * bufferLength / BAND_COUNT);
    const end = Math.floor((i+1) * bufferLength / BAND_COUNT);
    const slice = dataArray.slice(start, end);
    return slice.reduce((a,b)=>a+b,0)/slice.length;
  });
  fullCapture.push({
    timestamp: now.toISOString(),
    startTime: now.toISOString(),
    endTime: now.toISOString(),
    energy: channelEnergy(bandData),
    bands: bandData
  });
  pruneCapture();
  updatePanels();
}

function downloadRaw() {
  const blob = new Blob([JSON.stringify(fullCapture, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "mad_horizons_raw.json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function initCharts() {
  for (let i = 0; i < 5; i++) {
    charts[i] = new Chart(canvases[i].getContext('2d'), {
      type: 'bar',
      data: {
        labels: [],
        datasets: Array.from({length: DATASET_COUNT}, (_, ch) => ({
          label: datasetLabel(viewMode, ch),
          data: [],
          backgroundColor: datasetColor(viewMode, ch),
          stack: 'stack1',
          hidden: !datasetLabel(viewMode, ch)
        }))
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          x: { stacked: true },
          y: { stacked: true, beginAtZero: true }
        },
        plugins: {
          legend: { display: true },
          zoom: {
            pan: { enabled: true, mode: 'x' },
            zoom: { wheel: {enabled: true}, pinch: {enabled: true}, mode: 'x' }
          }
        }
      }
    });
  }
}

function updatePanels() {
  const now = Date.now();
  pruneCapture(now);

  const last24h = fullCapture.filter(s => toTime(s) >= now - DAY_MS);
  const oneMinute = last24h.filter(s => toTime(s) >= now - ONE_MINUTE_MS);
  const minuteComposites = bucketSamples(last24h, ONE_MINUTE_MS);
  const tenMinuteComposites = bucketSamples(minuteComposites, TEN_MINUTES_MS);
  const hourComposites = bucketSamples(tenMinuteComposites, ONE_HOUR_MS);
  const eightHourComposites = bucketSamples(hourComposites, EIGHT_HOURS_MS);

  redrawChart(charts[0], oneMinute, viewMode);
  redrawChart(charts[1], minuteComposites.filter(s => toTime(s) >= now - TEN_MINUTES_MS), viewMode);
  redrawChart(charts[2], tenMinuteComposites.filter(s => toTime(s) >= now - ONE_HOUR_MS), viewMode);
  redrawChart(charts[3], hourComposites.filter(s => toTime(s) >= now - EIGHT_HOURS_MS), viewMode);
  redrawChart(charts[4], eightHourComposites.filter(s => toTime(s) >= now - DAY_MS), viewMode);
}

function pruneCapture(now = Date.now()) {
  fullCapture = fullCapture.filter(s => toTime(s) >= now - DAY_MS);
}

function bucketSamples(samples, intervalMs) {
  const buckets = [];
  let current = [];
  let bucketStart = null;

  samples.forEach(sample => {
    const t = toTime(sample);
    if (bucketStart === null) bucketStart = t;

    if (t - bucketStart < intervalMs) {
      current.push(sample);
    } else {
      buckets.push(aggregateBucket(current));
      current = [sample];
      bucketStart = t;
    }
  });

  if (current.length) buckets.push(aggregateBucket(current));
  return buckets;
}

function aggregateBucket(bucket) {
  const normalized = bucket.map(normalizeSample);
  const averageBands = averageVectors(normalized.map(sample => sample.bands));
  const minBands = combineVectors(normalized.map(sample => sample.minBands), Math.min);
  const maxBands = combineVectors(normalized.map(sample => sample.maxBands), Math.max);
  const energyValues = normalized.map(sample => sample.averageEnergy);
  const averageEnergy = averageNumbers(energyValues);
  const minEnergy = Math.min(...normalized.map(sample => sample.minEnergy));
  const maxEnergy = Math.max(...normalized.map(sample => sample.maxEnergy));
  const profile = buildProfile(normalized);
  const startTime = new Date(Math.min(...normalized.map(sample => Date.parse(sample.startTime)))).toISOString();
  const endTime = new Date(Math.max(...normalized.map(sample => Date.parse(sample.endTime)))).toISOString();

  return {
    timestamp: startTime,
    startTime,
    endTime,
    energy: averageEnergy,
    averageEnergy,
    minEnergy,
    maxEnergy,
    bands: averageBands,
    channels: averageBands,
    average: averageBands,
    minBands,
    maxBands,
    profile,
    children: normalized,
    sourceCount: normalized.reduce((total, sample) => total + sample.sourceCount, 0)
  };
}

function normalizeSample(sample) {
  const bands = sample.bands || sample.average || sample.channels || Array(BAND_COUNT).fill(0);
  const minBands = sample.minBands || sample.min || bands;
  const maxBands = sample.maxBands || sample.max || bands;
  const averageEnergy = sample.averageEnergy ?? sample.energy ?? channelEnergy(bands);
  const minEnergy = sample.minEnergy ?? averageEnergy;
  const maxEnergy = sample.maxEnergy ?? averageEnergy;
  const profile = sample.profile || buildProfile([{ averageEnergy, energy: averageEnergy, sourceCount: 1 }]);
  const timestamp = sample.timestamp || sample.startTime || new Date().toISOString();

  return {
    timestamp,
    startTime: sample.startTime || timestamp,
    endTime: sample.endTime || timestamp,
    energy: averageEnergy,
    averageEnergy,
    minEnergy,
    maxEnergy,
    bands,
    channels: bands,
    average: bands,
    minBands,
    maxBands,
    profile,
    children: sample.children || [],
    sourceCount: sample.sourceCount || 1
  };
}

function averageVectors(vectors) {
  const sums = Array(BAND_COUNT).fill(0);
  if (!vectors.length) return sums;

  vectors.forEach(vector => {
    vector.forEach((value, i) => sums[i] += value);
  });

  return sums.map(sum => sum / vectors.length);
}

function averageNumbers(values) {
  if (!values.length) return 0;
  return values.reduce((sum, value) => sum + value, 0) / values.length;
}

function combineVectors(vectors, reducer) {
  if (!vectors.length) return Array(BAND_COUNT).fill(0);

  return Array.from({length: BAND_COUNT}, (_, i) => (
    vectors.map(vector => vector[i]).reduce(reducer)
  ));
}

function buildProfile(samples) {
  const profile = Array(PROFILE_POINTS).fill(0);
  const counts = Array(PROFILE_POINTS).fill(0);
  if (!samples.length) return profile;

  samples.forEach((sample, index) => {
    const profileSource = sample.profile && sample.profile.length ? sample.profile : [sample.averageEnergy ?? sample.energy ?? channelEnergy(sample.bands || sample.average || sample.channels || [])];

    profileSource.forEach((value, pointIndex) => {
      const slot = Math.min(PROFILE_POINTS - 1, Math.floor(((index + pointIndex / profileSource.length) / samples.length) * PROFILE_POINTS));
      profile[slot] += value;
      counts[slot] += 1;
    });
  });

  return profile.map((value, i) => counts[i] ? value / counts[i] : 0);
}

function channelEnergy(channels) {
  if (!channels.length) return 0;
  return channels.reduce((sum, value) => sum + value, 0) / channels.length;
}

function toTime(sample) {
  return Date.parse(sample.startTime || sample.timestamp);
}

function formatLabel(item) {
  const start = new Date(item.startTime || item.timestamp).toLocaleTimeString();
  const end = new Date(item.endTime || item.timestamp).toLocaleTimeString();
  return start === end ? start : `${start}-${end}`;
}

function valuesForMode(item, mode) {
  const sample = normalizeSample(item);

  if (mode === 'range') {
    return [sample.averageEnergy, Math.max(0, sample.maxEnergy - sample.minEnergy)];
  }

  if (mode === 'shape') {
    return sample.profile;
  }

  if (mode === 'trend') {
    const first = sample.profile[0] || sample.averageEnergy;
    const last = sample.profile[sample.profile.length - 1] || sample.averageEnergy;
    return [sample.averageEnergy, Math.max(0, last - first), Math.max(0, first - last)];
  }

  return [sample.averageEnergy];
}

function datasetLabel(mode, index) {
  if (mode === 'range') return ['Level', 'Variation'][index] || '';
  if (mode === 'shape') return `Shape ${index + 1}`;
  if (mode === 'trend') return ['Level', 'Rising trend', 'Falling trend'][index] || '';
  return index === 0 ? 'Level' : '';
}

function datasetColor(mode, index) {
  if (mode === 'range') return ['rgba(125, 196, 255, 0.8)', 'rgba(255, 255, 255, 0.35)'][index] || 'rgba(0,0,0,0)';
  if (mode === 'shape') return `hsl(${210 + index * 8},70%,${35 + index * 4}%)`;
  if (mode === 'trend') return ['rgba(190, 190, 190, 0.75)', 'rgba(96, 255, 170, 0.65)', 'rgba(255, 120, 120, 0.65)'][index] || 'rgba(0,0,0,0)';
  return index === 0 ? 'rgba(125, 196, 255, 0.85)' : 'rgba(0,0,0,0)';
}

function redrawChart(chart, data, mode) {
  chart.data.labels = data.map(formatLabel);

  chart.data.datasets.forEach((dataset, i) => {
    dataset.label = datasetLabel(mode, i);
    dataset.data = data.map(item => valuesForMode(item, mode)[i] || 0);
    dataset.backgroundColor = datasetColor(mode, i);
    dataset.stack = 'stack1';
    dataset.hidden = !dataset.label;
  });

  chart.update();
}

function clearDisplays() {
  charts.forEach(chart => {
    chart.data.labels = [];
    chart.data.datasets.forEach(ds => ds.data = []);
    chart.update();
  });
}

initCharts();
</script>
</body>
</html>
