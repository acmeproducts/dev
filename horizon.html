<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MAD Horizons v1.2</title>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: Arial, sans-serif; overflow: hidden; }
    .controls, .config-row { padding: 10px; background: #111; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    button, select, input { background: #333; color: white; border: none; padding: 8px 12px; cursor: pointer; }
    input[type="file"] { max-width: 210px; }
    label { color: #ccc; display: flex; align-items: center; gap: 6px; }
    details { background: #090909; border-top: 1px solid #222; }
    summary { cursor: pointer; padding: 8px 10px; color: #9df; }
    #artCanvas { display: block; width: 100%; height: calc(100vh - 245px); min-height: 360px; background: #090710; }
    .art-stage { position: relative; }
    .time-hud { position: absolute; top: 14px; right: 16px; max-width: min(420px, 48vw); padding: 10px 12px; border: 1px solid rgba(157, 243, 255, 0.28); border-radius: 12px; background: rgba(5, 8, 18, 0.72); color: #eaffff; font-size: 13px; line-height: 1.35; pointer-events: none; box-shadow: 0 12px 30px rgba(0,0,0,0.35); backdrop-filter: blur(6px); }
    .time-hud strong { color: #7fffd4; }
    .panel-container { display: none; flex-direction: column; height: 300px; overflow-y: auto; opacity: 0.45; }
    .panel { flex: none; height: 350px; border-bottom: 1px solid #444; position: relative; padding: 5px; }
    .label { font-size: 18px; padding: 5px 10px; }
    canvas { width: 100%; height: 300px; background: black; }
    .status { height: 40px; background: #222; color: #0f0; font-size: 16px; padding: 8px 12px; box-sizing: border-box; }
  </style>
</head>
<body>
  <div class="controls">
    <button onclick="startCapture()">Start</button>
    <button onclick="stopCapture()">Stop</button>
    <button onclick="clearData()">Clear</button>
    <button onclick="downloadRaw()">Export Data</button>
    <label>Import Data<input id="dataImport" type="file" accept="application/json" onchange="importRawData(event)"></label>
    <button onclick="startReplay(60)">Replay 60x</button>
    <button onclick="startReplay(1)">Replay Real-Time</button>
    <button onclick="stopReplay()">Stop Replay</button>
  </div>
  <details open>
    <summary>Time Lens</summary>
    <div class="config-row">
      <label>Source<select id="timeSource"><option value="currentSession">Current Session</option><option value="all">All History</option></select></label>
      <label>Range<select id="timeRange"><option value="currentSession">Current Session</option><option value="last24h">Last 24 Hours</option><option value="today">Today</option><option value="week">Week</option><option value="month">Month</option><option value="year">Year</option><option value="all">All</option><option value="custom">Custom</option></select></label>
      <label>Start<input id="timeStartDate" type="date"></label>
      <label>End<input id="timeEndDate" type="date"></label>
      <label>Weekday<select id="timeWeekday"><option value="any">Any</option><option value="1">Monday</option><option value="2">Tuesday</option><option value="3">Wednesday</option><option value="4">Thursday</option><option value="5">Friday</option><option value="6">Saturday</option><option value="0">Sunday</option></select></label>
      <label>Time Start<input id="timeStart" type="time"></label>
      <label>Time End<input id="timeEnd" type="time"></label>
      <label>Compare<select id="timeCompare"><option value="none">None</option><option value="weekdays">Weekdays</option><option value="hours">Hours</option><option value="days">Days</option><option value="months">Months</option></select></label>
    </div>
  </details>
  <details open>
    <summary>Generative Artwork</summary>
    <div class="config-row">
      <label>Mode<select id="artMode"><option value="story">Story</option><option value="shape">Shape</option><option value="color">Color</option><option value="scale">Scale</option><option value="weave">Weave</option></select></label>
      <label>Seed<input id="artSeed" value="horizon"></label>
      <label>Palette<select id="artPalette"><option value="aurora" selected>Aurora</option><option value="dusk">Dusk</option><option value="ember">Ember</option><option value="ocean">Ocean</option><option value="forest">Forest</option><option value="neon">Neon</option><option value="monochrome">Monochrome</option></select></label>
      <label>Color By<select id="artColorBy"><option value="intensity">Intensity</option><option value="frequency">Frequency</option></select></label>
      <button onclick="saveConfig()">Save Config</button>
      <button onclick="loadConfig()">Load Saved Config</button>
      <button onclick="exportConfig()">Export Config</button>
      <label>Import Config<input id="configImport" type="file" accept="application/json" onchange="importConfig(event)"></label>
    </div>
  </details>
  <div class="status" id="status">Idle</div>
  <div class="art-stage">
    <canvas id="artCanvas"></canvas>
    <div class="time-hud" id="timeHud">Sound quilt ready — record audio, import data, or replay an archive to inspect noise pollution over seconds, minutes, hours, and days.</div>
  </div>
  <details>
    <summary>Legacy measurement horizons</summary>
    <div class="panel-container" style="display:flex">
      <div class="panel"><div class="label">Close Horizon</div><canvas id="canvas1"></canvas></div>
      <div class="panel"><div class="label">Minute Horizon</div><canvas id="canvas2"></canvas></div>
      <div class="panel"><div class="label">Hour Horizon</div><canvas id="canvas3"></canvas></div>
      <div class="panel"><div class="label">Day Horizon</div><canvas id="canvas4"></canvas></div>
      <div class="panel"><div class="label">Month Horizon</div><canvas id="canvas5"></canvas></div>
    </div>
  </details>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const analyser = audioCtx.createAnalyser();
analyser.fftSize = 2048;
const bufferLength = analyser.frequencyBinCount;
const dataArray = new Uint8Array(bufferLength);
let streamSource, captureInterval, fullCapture = [];
const sessions = [];
let currentSession = null;
const BAND_COUNT = 10;
const PROFILE_POINTS = 10;
const ONE_SECOND_MS = 1000;
const ONE_MINUTE_MS = 60 * ONE_SECOND_MS;
const TEN_MINUTES_MS = 10 * ONE_MINUTE_MS;
const ONE_HOUR_MS = 60 * ONE_MINUTE_MS;
const EIGHT_HOURS_MS = 8 * ONE_HOUR_MS;
const DAY_MS = 24 * ONE_HOUR_MS;
const WEEK_MS = 7 * DAY_MS;
const MONTH_MS = 31 * DAY_MS;
const YEAR_MS = 365 * DAY_MS;
const INTENSITY_CLASSES = [
  { label: 'Quiet', max: 20 },
  { label: 'Ambient', max: 45 },
  { label: 'Moderate', max: 80 },
  { label: 'Loud', max: 120 },
  { label: 'Louder', max: 180 },
  { label: 'Loudest', max: Infinity }
];
const BAND_LABELS = ['Sub', 'Rumble', 'Low', 'Warmth', 'Body', 'Mid', 'Presence', 'Detail', 'Sharp', 'Air'];
const PALETTES = {
  aurora: { background: '#040716', quiet: '#10205a', ambient: '#134bc2', moderate: '#00a9ff', loud: '#00ffd1', louder: '#f7ff4a', loudest: '#ff4fd8', accent: '#ffb000', line: '#f8ffff' },
  dusk: { background: '#090710', quiet: '#25233f', ambient: '#3e3a6d', moderate: '#6a5191', loud: '#b45a86', louder: '#ec7a63', loudest: '#ffd38a', accent: '#9df3ff', line: '#f8e9ff' },
  ember: { background: '#120806', quiet: '#2b1712', ambient: '#643018', moderate: '#a34a1d', loud: '#de6a22', louder: '#ff9838', loudest: '#ffe0a0', accent: '#ffcf6e', line: '#fff0c2' },
  ocean: { background: '#031016', quiet: '#082637', ambient: '#0d4660', moderate: '#15748c', loud: '#20a7b2', louder: '#58d1d7', loudest: '#c1fffb', accent: '#7cc8ff', line: '#e5ffff' },
  forest: { background: '#061107', quiet: '#122818', ambient: '#1f482b', moderate: '#3d7440', loud: '#68a554', louder: '#a1cf6b', loudest: '#efffc0', accent: '#d6a957', line: '#f4ffe0' },
  monochrome: { background: '#050505', quiet: '#1c1c1c', ambient: '#333', moderate: '#666', loud: '#999', louder: '#ccc', loudest: '#fff', accent: '#aaa', line: '#f6f6f6' },
  neon: { background: '#020006', quiet: '#24004d', ambient: '#4b00b8', moderate: '#006cff', loud: '#00f5ff', louder: '#39ff14', loudest: '#fffb00', accent: '#ff2bd6', line: '#ffffff' }
};
const timeConfig = { source: 'all', range: 'last24h', startDate: '', endDate: '', weekday: 'any', timeStart: '', timeEnd: '', compare: 'none' };
const artConfig = { mode: 'story', seed: 'horizon', palette: 'aurora', colorBy: 'intensity' };
let viewMode = 'mean';
const canvases = [1,2,3,4,5].map(n => document.getElementById('canvas'+n));
const charts = [];
const statusEl = document.getElementById('status');
const artCanvas = document.getElementById('artCanvas');
const artCtx = artCanvas.getContext('2d');
const timeHud = document.getElementById('timeHud');
let lastArtRender = null;
let lastPanelUpdate = 0;
let pendingPanelFrame = null;
let lastChartUpdate = -Infinity;
let replayTimer = null;
let replaySamples = [];
let replayIndex = 0;
let replaySession = null;
const configControls = {
  timeSource: 'source', timeRange: 'range', timeStartDate: 'startDate', timeEndDate: 'endDate', timeWeekday: 'weekday', timeStart: 'timeStart', timeEnd: 'timeEnd', timeCompare: 'compare',
  artMode: 'mode', artSeed: 'seed', artPalette: 'palette', artColorBy: 'colorBy'
};

function setStatus(msg, color = "#0f0") {
  statusEl.textContent = msg;
  statusEl.style.color = color;
}

function startCapture() {
  if (!currentSession) {
    const startedAt = new Date().toISOString();
    currentSession = { id: `session-${Date.now()}`, startedAt, stoppedAt: null, label: `Session ${sessions.length + 1}`, samples: [] };
    sessions.push(currentSession);
  }
  setStatus("Starting...");
  audioCtx.resume().then(() => {
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
      stopStreamOnly();
      setStatus("Capturing Audio", "#0f0");
      streamSource = audioCtx.createMediaStreamSource(stream);
      streamSource.connect(analyser);
      clearInterval(captureInterval);
      captureInterval = setInterval(captureSample, 1000);
      try {
        renderArt();
      } catch (err) {
        console.error('Render failed after microphone start', err);
      }
    }, err => {
      if (currentSession && !currentSession.samples.length) sessions.pop();
      currentSession = null;
      setStatus("Mic Denied: "+err.name, "#f00");
      alert("Microphone access denied: "+err.message);
    });
  });
}

function stopStreamOnly() {
  clearInterval(captureInterval);
  if (streamSource) {
    const stream = streamSource.mediaStream;
    streamSource.disconnect();
    if (stream) stream.getTracks().forEach(track => track.stop());
  }
  streamSource = null;
}

function stopCapture() {
  if (replayTimer) stopReplay(null);
  stopStreamOnly();
  if (currentSession) currentSession.stoppedAt = new Date().toISOString();
  currentSession = null;
  updatePanels();
  setStatus("Stopped", "#ff0");
}

function clearData() {
  stopCapture();
  sessions.length = 0;
  currentSession = null;
  fullCapture = [];
  clearDisplays();
  renderArt();
  setStatus("Cleared", "#0ff");
}

function captureSample() {
  analyser.getByteFrequencyData(dataArray);
  const now = new Date();
  const bandData = Array.from({length: BAND_COUNT}, (_, i) => {
    const start = Math.floor(i * bufferLength / BAND_COUNT);
    const end = Math.floor((i+1) * bufferLength / BAND_COUNT);
    const slice = dataArray.slice(start, end);
    return slice.reduce((a,b)=>a+b,0)/slice.length;
  });
  const sample = {
    timestamp: now.toISOString(),
    startTime: now.toISOString(),
    endTime: now.toISOString(),
    energy: averageEnergy(bandData),
    bands: bandData
  };
  recordSample(sample);
}

function recordSample(sample) {
  const normalized = normalizeSample(sample);
  fullCapture.push(normalized);
  if (currentSession) currentSession.samples.push(normalized);
  requestPanelUpdate();
}

function downloadRaw() {
  const payload = { exportedAt: new Date().toISOString(), sessions, samples: getAllSamples(), config: { artConfig, timeConfig } };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  downloadBlob(blob, "mad_horizons_sound_quilt.json");
}

function importRawData(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const payload = JSON.parse(reader.result);
      const importedSessions = Array.isArray(payload.sessions) ? payload.sessions : [];
      const importedSamples = importedSessions.length ? [] : (Array.isArray(payload.samples) ? payload.samples : (Array.isArray(payload) ? payload : []));
      importedSessions.forEach(session => sessions.push({ ...session, samples: (session.samples || []).map(normalizeSample) }));
      if (importedSamples.length) {
        sessions.push({ id: `import-${Date.now()}`, startedAt: new Date().toISOString(), stoppedAt: new Date().toISOString(), label: `Imported ${new Date().toLocaleString()}`, samples: importedSamples.map(normalizeSample) });
      }
      if (payload.config) mergeConfig(payload.config);
      applyConfig();
      setStatus(`Imported ${importedSamples.length || importedSessions.length} sound records`, '#9df');
    } catch (err) {
      setStatus('Invalid data JSON', '#f00');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function startReplay(speed = 60) {
  stopReplay();
  const source = getAllSamples();
  if (!source.length) return setStatus('No sound data to replay', '#ff0');
  clearData();
  replaySamples = source.map(normalizeSample);
  replayIndex = 0;
  const startedAt = new Date().toISOString();
  replaySession = { id: `replay-${Date.now()}`, startedAt, stoppedAt: null, label: `Replay ${speed}x`, samples: [] };
  currentSession = replaySession;
  sessions.push(replaySession);
  setStatus(`Replaying archive at ${speed}x`, '#9df');
  replayNext(Number(speed) || 1);
}

function replayNext(speed) {
  if (!replaySession || replayIndex >= replaySamples.length) return stopReplay('Replay complete');
  const original = replaySamples[replayIndex++];
  const now = new Date().toISOString();
  recordSample({ ...original, timestamp: now, startTime: now, endTime: now, replayedFrom: original.startTime || original.timestamp });
  if (replayIndex >= replaySamples.length) return stopReplay('Replay complete');
  const previousTime = safeTime(original);
  const nextTime = safeTime(replaySamples[replayIndex]);
  const sourceGap = Number.isFinite(previousTime) && Number.isFinite(nextTime) ? Math.max(0, nextTime - previousTime) : 1000;
  const delay = Math.max(16, sourceGap / Math.max(1, speed));
  replayTimer = setTimeout(() => replayNext(speed), delay);
}

function stopReplay(message = 'Replay stopped') {
  if (replayTimer) clearTimeout(replayTimer);
  replayTimer = null;
  if (replaySession) replaySession.stoppedAt = new Date().toISOString();
  replaySession = null;
  if (currentSession && String(currentSession.id || '').startsWith('replay-')) currentSession = null;
  if (message) setStatus(message, '#ff0');
}


function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function saveConfig() {
  localStorage.setItem('madHorizonConfig', JSON.stringify({ artConfig, timeConfig }));
  setStatus('Config saved', '#9df');
  renderArt();
}

function loadConfig() {
  const saved = localStorage.getItem('madHorizonConfig');
  if (!saved) return setStatus('No saved config', '#ff0');
  mergeConfig(JSON.parse(saved));
  applyConfig();
  setStatus('Config loaded', '#9df');
}

function exportConfig() {
  const blob = new Blob([JSON.stringify({ artConfig, timeConfig }, null, 2)], { type: 'application/json' });
  downloadBlob(blob, 'mad_horizon_config.json');
  setStatus('Config exported', '#9df');
  renderArt();
}

function importConfig(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      mergeConfig(JSON.parse(reader.result));
      applyConfig();
      setStatus('Config imported', '#9df');
    } catch (err) {
      setStatus('Invalid config JSON', '#f00');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function mergeConfig(config) {
  if (!config || typeof config !== 'object') throw new Error('Invalid config JSON');
  Object.keys(timeConfig).forEach(key => {
    if (config.timeConfig && Object.prototype.hasOwnProperty.call(config.timeConfig, key)) timeConfig[key] = String(config.timeConfig[key]);
  });
  Object.keys(artConfig).forEach(key => {
    if (config.artConfig && Object.prototype.hasOwnProperty.call(config.artConfig, key)) artConfig[key] = String(config.artConfig[key]);
  });
}

function applyConfig() {
  Object.entries(configControls).forEach(([id, key]) => {
    const el = document.getElementById(id);
    const target = id.startsWith('time') ? timeConfig : artConfig;
    if (el && Object.prototype.hasOwnProperty.call(target, key)) el.value = target[key];
  });
  updatePanels();
}

function readConfigControls() {
  Object.entries(configControls).forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (!el) return;
    const target = id.startsWith('time') ? timeConfig : artConfig;
    target[key] = el.value;
  });
  requestPanelUpdate(true);
}

function initCharts() {
  for (let i = 0; i < 5; i++) {
    charts[i] = new Chart(canvases[i].getContext('2d'), {
      type: 'bar',
      data: { labels: [], datasets: [{ label: 'Energy', data: [], backgroundColor: 'rgba(0, 200, 255, 0.45)', stack: 'energy' }] },
      options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } }, plugins: { legend: { display: true }, zoom: { pan: { enabled: true, mode: 'x' }, zoom: { wheel: {enabled: true}, pinch: {enabled: true}, mode: 'x' } } } }
    });
  }
}

function requestPanelUpdate(force = false) {
  if (pendingPanelFrame) cancelAnimationFrame(pendingPanelFrame);
  pendingPanelFrame = requestAnimationFrame(() => {
    pendingPanelFrame = null;
    const now = performance.now();
    if (!force && now - lastPanelUpdate < 250) return;
    lastPanelUpdate = now;
    updatePanels(force);
  });
}

function updatePanels(forceCharts = false) {
  const model = buildHorizonModel();
  const now = performance.now();
  const shouldUpdateCharts = forceCharts || now - lastChartUpdate > 3000;
  if (shouldUpdateCharts) {
    redrawChart(charts[0], model.seconds, viewMode);
    redrawChart(charts[1], model.minutes, viewMode);
    redrawChart(charts[2], model.hours, viewMode);
    redrawChart(charts[3], model.days, viewMode);
    redrawChart(charts[4], model.months, viewMode);
    lastChartUpdate = now;
  }
  renderArt(model);
}

function getAllSamples() {
  const seen = new Set();
  const collected = [];
  const add = sample => {
    if (!sample) return;
    const key = `${sample.timestamp || ''}|${sample.startTime || ''}|${sample.endTime || ''}`;
    if (!seen.has(key)) {
      seen.add(key);
      collected.push(sample);
    }
  };
  sessions.forEach(session => (session.samples || []).forEach(add));
  fullCapture.forEach(add);
  return collected.sort((a, b) => safeTime(a) - safeTime(b));
}

function filterSamplesByRange(samples, startTime, endTime) {
  const parsedStart = startTime ? Date.parse(startTime) : -Infinity;
  const parsedEnd = endTime ? Date.parse(endTime) : Infinity;
  const start = Number.isFinite(parsedStart) ? parsedStart : -Infinity;
  const end = Number.isFinite(parsedEnd) ? parsedEnd : Infinity;
  return samples.filter(sample => {
    const time = toTime(sample);
    return Number.isFinite(time) && time >= start && time <= end;
  });
}

function filterSamplesByWeekday(samples, weekday) {
  if (weekday === 'any') return samples;
  return samples.filter(sample => {
    const time = toTime(sample);
    return Number.isFinite(time) && new Date(time).getDay() === Number(weekday);
  });
}

function filterSamplesByTimeOfDay(samples, startTime, endTime) {
  if (!startTime && !endTime) return samples;
  const toMinutes = value => {
    const [h = 0, m = 0] = String(value || '00:00').split(':').map(Number);
    return h * 60 + m;
  };
  const start = startTime ? toMinutes(startTime) : 0;
  const end = endTime ? toMinutes(endTime) : 24 * 60 - 1;
  return samples.filter(sample => {
    const time = toTime(sample);
    if (!Number.isFinite(time)) return false;
    const date = new Date(time);
    const minute = date.getHours() * 60 + date.getMinutes();
    return start <= end ? minute >= start && minute <= end : minute >= start || minute <= end;
  });
}

function filterSamplesForView(samples, config) {
  let scoped = config.source === 'currentSession' && currentSession ? currentSession.samples.slice() : samples.slice();
  const now = new Date();
  if (config.range === 'currentSession') scoped = currentSession ? currentSession.samples.slice() : [];
  if (config.range === 'last24h') scoped = filterSamplesByRange(scoped, new Date(now - DAY_MS).toISOString());
  if (config.range === 'today') scoped = filterSamplesByRange(scoped, new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString());
  if (config.range === 'week') scoped = filterSamplesByRange(scoped, new Date(now - WEEK_MS).toISOString());
  if (config.range === 'month') scoped = filterSamplesByRange(scoped, new Date(now - MONTH_MS).toISOString());
  if (config.range === 'year') scoped = filterSamplesByRange(scoped, new Date(now - YEAR_MS).toISOString());
  if (config.range === 'custom') {
    const start = config.startDate ? `${config.startDate}T00:00:00` : '';
    const end = config.endDate ? `${config.endDate}T23:59:59` : '';
    scoped = filterSamplesByRange(scoped, start, end);
  }
  scoped = filterSamplesByWeekday(scoped, config.weekday);
  scoped = filterSamplesByTimeOfDay(scoped, config.timeStart, config.timeEnd);
  return scoped.sort((a, b) => safeTime(a) - safeTime(b));
}

function buildHorizonModel() {
  const samples = filterSamplesForView(getAllSamples(), timeConfig);
  const span = samples.length ? safeTime(samples[samples.length - 1]) - safeTime(samples[0]) : 0;
  const seconds = samples.length > 900 ? bucketSamples(samples, Math.ceil(span / 900)) : samples.map(normalizeSample);
  const minutes = bucketSamples(samples, ONE_MINUTE_MS);
  const hours = bucketSamples(samples, ONE_HOUR_MS);
  const days = bucketSamples(samples, DAY_MS);
  const months = groupByMonth(samples);
  let comparison = [];
  if (timeConfig.compare === 'weekdays') comparison = groupByWeekday(samples);
  if (timeConfig.compare === 'hours') comparison = groupByHourOfDay(samples);
  if (timeConfig.compare === 'days') comparison = groupByDate(samples);
  if (timeConfig.compare === 'months') comparison = groupByMonth(samples);
  return { samples, seconds, minutes, hours, days, months, comparison };
}

function bucketSamples(samples, intervalMs) {
  if (!Array.isArray(samples) || !samples.length || !Number.isFinite(intervalMs) || intervalMs <= 0) return [];
  const ordered = samples.filter(sample => Number.isFinite(toTime(sample))).slice().sort((a, b) => safeTime(a) - safeTime(b));
  const buckets = [];
  let current = [];
  let bucketStart = null;
  ordered.forEach(sample => {
    const t = toTime(sample);
    if (!Number.isFinite(t)) return;
    if (bucketStart === null) bucketStart = t;
    if (t - bucketStart < intervalMs) {
      current.push(sample);
    } else {
      buckets.push(aggregateBucket(current));
      current = [sample];
      bucketStart = t;
    }
  });
  if (current.length) buckets.push(aggregateBucket(current));
  return buckets;
}

function aggregateBucket(bucket) {
  const normalized = bucket.map(normalizeSample);
  const bandSets = normalized.map(sample => sample.bands).filter(bands => bands && bands.length);
  const bands = bandSets.length ? averageVectors(bandSets) : undefined;
  const energyValues = normalized.map(sample => sample.energy);
  const energy = averageScalars(energyValues);
  const minEnergy = Math.min(...normalized.map(sample => sample.minEnergy));
  const maxEnergy = Math.max(...normalized.map(sample => sample.maxEnergy));
  const profile = buildProfile(normalized);
  const startTime = new Date(Math.min(...normalized.map(sample => Date.parse(sample.startTime)))).toISOString();
  const endTime = new Date(Math.max(...normalized.map(sample => Date.parse(sample.endTime)))).toISOString();
  const sourceCount = normalized.reduce((total, sample) => total + sample.sourceCount, 0);
  const cumulativeEnergy = normalized.reduce((total, sample) => total + coerceEnergy(sample.cumulativeEnergy, sample.averageEnergy * sample.sourceCount), 0);

  return { timestamp: startTime, startTime, endTime, energy, averageEnergy: energy, minEnergy, maxEnergy, profile, bands, children: normalized, sourceCount, cumulativeEnergy };
}

function normalizeSample(sample) {
  const bands = sample.bands || sample.channels || sample.average || Array(BAND_COUNT).fill(0);
  const energy = coerceEnergy(sample.energy, sample.averageEnergy, sample.level, sample.primaryEnergy, averageEnergy(bands));
  const minEnergy = coerceEnergy(sample.minEnergy, sample.min && averageEnergy(sample.min), energy);
  const maxEnergy = coerceEnergy(sample.maxEnergy, sample.max && averageEnergy(sample.max), energy);
  const profile = sample.profile || Array(PROFILE_POINTS).fill(energy);
  const timestamp = sample.timestamp || sample.startTime || new Date().toISOString();
  const sourceCount = sample.sourceCount || 1;
  const average = coerceEnergy(sample.averageEnergy, energy);
  const cumulativeEnergy = coerceEnergy(sample.cumulativeEnergy, average * sourceCount);

  return { timestamp, startTime: sample.startTime || timestamp, endTime: sample.endTime || timestamp, energy, averageEnergy: average, minEnergy, maxEnergy, profile, bands, children: sample.children || [], sourceCount, cumulativeEnergy, label: sample.label };
}

function buildPeriodComposite(samples, label) {
  if (!samples.length) return null;
  const composite = aggregateBucket(samples);
  composite.label = label;
  return composite;
}

function groupBy(samples, keyFn, labelFn) {
  const map = new Map();
  samples.forEach(sample => {
    const key = keyFn(sample);
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(sample);
  });
  return Array.from(map.entries()).sort(([a], [b]) => String(a).localeCompare(String(b))).map(([key, group]) => buildPeriodComposite(group, labelFn(key))).filter(Boolean);
}

function groupByWeekday(samples) {
  const names = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
  return groupBy(samples.filter(sample => Number.isFinite(toTime(sample))), sample => new Date(toTime(sample)).getDay(), key => names[key]);
}

function groupByHourOfDay(samples) {
  return groupBy(samples.filter(sample => Number.isFinite(toTime(sample))), sample => new Date(toTime(sample)).getHours(), key => `${String(key).padStart(2, '0')}:00`);
}

function groupByDate(samples) {
  return groupBy(samples.filter(sample => Number.isFinite(toTime(sample))), sample => new Date(toTime(sample)).toISOString().slice(0, 10), key => key);
}

function groupByMonth(samples) {
  return groupBy(samples.filter(sample => Number.isFinite(toTime(sample))), sample => new Date(toTime(sample)).toISOString().slice(0, 7), key => key);
}

function resizeArtCanvas() {
  const rect = artCanvas.getBoundingClientRect();
  const ratio = window.devicePixelRatio || 1;
  artCanvas.width = Math.max(1, Math.floor(rect.width * ratio));
  artCanvas.height = Math.max(1, Math.floor(rect.height * ratio));
  artCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
  renderArt();
}

function renderArt(model = buildHorizonModel()) {
  if (!artCtx) return;
  const width = artCanvas.clientWidth;
  const height = artCanvas.clientHeight;
  const palette = PALETTES[artConfig.palette] || PALETTES.aurora;
  artCtx.clearRect(0, 0, width, height);
  artCtx.fillStyle = palette.background;
  artCtx.fillRect(0, 0, width, height);
  if (!model || !Array.isArray(model.samples) || !model.samples.length) {
    drawSoundQuiltEmptyState(palette);
    lastArtRender = null;
    updateTimeHud([], null);
    return;
  }
  const quilt = buildSoundQuilt(model.samples);
  renderSoundQuilt(quilt, palette, width, height);
  lastArtRender = { items: quilt.inspectItems, palette, width, height, model, quilt };
  updateTimeHud(quilt.inspectItems, null);
}

function drawSoundQuiltEmptyState(palette) {
  artCtx.fillStyle = palette.line;
  artCtx.globalAlpha = 0.72;
  artCtx.font = '18px Arial';
  artCtx.fillText('Start recording or import an archive to paint your sound quilt.', 24, 42);
  artCtx.font = '13px Arial';
  artCtx.fillText('Rows: 60 seconds · 5 minutes · 10 minutes · hour epilogue · last 24 hours · previous two days.', 24, 68);
  artCtx.globalAlpha = 1;
}

function buildSoundQuilt(samples) {
  const ordered = samples.map(normalizeSample).filter(sample => Number.isFinite(toTime(sample))).sort((a, b) => safeTime(a) - safeTime(b));
  const anchor = ordered.length ? safeTime(ordered[ordered.length - 1]) : Date.now();
  return {
    seconds: fixedTimeBuckets(ordered, anchor - 60 * 1000, 1000, 60, 'second'),
    fiveMinutes: fixedTimeBuckets(ordered, anchor - 5 * ONE_MINUTE_MS, 1000, 300, '5-minute second'),
    tenMinutes: fixedTimeBuckets(ordered, anchor - 10 * ONE_MINUTE_MS, 1000, 600, '10-minute second'),
    hour: fixedTimeBuckets(ordered, anchor - ONE_HOUR_MS, ONE_HOUR_MS / 100, 100, 'hour cell'),
    last12: fixedTimeBuckets(ordered, anchor - 12 * ONE_HOUR_MS, 12 * ONE_HOUR_MS / 30, 30, 'last 12 hours'),
    prior12: fixedTimeBuckets(ordered, anchor - 24 * ONE_HOUR_MS, 6 * ONE_HOUR_MS, 2, 'prior 12 hours'),
    previousDay: fixedTimeBuckets(ordered, anchor - 48 * ONE_HOUR_MS, 24 * ONE_HOUR_MS / 24, 24, 'previous day'),
    dayBefore: fixedTimeBuckets(ordered, anchor - 72 * ONE_HOUR_MS, 24 * ONE_HOUR_MS / 24, 24, 'day before previous'),
    inspectItems: ordered
  };
}

function fixedTimeBuckets(samples, startMs, intervalMs, count, label) {
  let cursor = 0;
  return Array.from({ length: count }, (_, index) => {
    const start = startMs + index * intervalMs;
    const end = start + intervalMs;
    while (cursor < samples.length && safeTime(samples[cursor]) < start) cursor++;
    const bucket = [];
    let scan = cursor;
    while (scan < samples.length && safeTime(samples[scan]) < end) bucket.push(samples[scan++]);
    const item = bucket.length ? aggregateBucket(bucket) : emptyBucket(start, end);
    item.label = `${label} ${index + 1}`;
    item.fillRatio = Math.max(0, Math.min(1, item.averageEnergy / 180));
    return item;
  });
}

function emptyBucket(start, end) {
  const timestamp = new Date(start).toISOString();
  return { timestamp, startTime: timestamp, endTime: new Date(end).toISOString(), energy: 0, averageEnergy: 0, minEnergy: 0, maxEnergy: 0, profile: Array(PROFILE_POINTS).fill(0), bands: Array(BAND_COUNT).fill(0), sourceCount: 0, cumulativeEnergy: 0, empty: true };
}

function renderSoundQuilt(quilt, palette, width, height) {
  const pad = Math.max(10, Math.min(18, width * 0.018));
  const labelW = Math.min(132, Math.max(78, width * 0.16));
  const gap = 8;
  const usableW = width - pad * 2 - labelW;
  let y = pad;
  artCtx.save();
  drawQuiltTitle(palette, pad, y, width);
  y += 34;
  y = drawCellRow('60 seconds', quilt.seconds, pad, labelW, y, usableW, Math.max(8, Math.min(18, height * 0.035)), palette, 60) + gap;
  y = drawCellRow('5 minutes', quilt.fiveMinutes, pad, labelW, y, usableW, Math.max(6, Math.min(14, height * 0.026)), palette, 300) + gap;
  y = drawCellRow('10 minutes', quilt.tenMinutes, pad, labelW, y, usableW, Math.max(5, Math.min(12, height * 0.022)), palette, 600) + gap + 2;
  const squareSize = Math.min(usableW, Math.max(112, Math.min(230, height * 0.28)));
  drawHourEpilogue(quilt.hour, pad, labelW, y, squareSize, palette);
  const rightX = pad + labelW + squareSize + gap * 2;
  const rightW = width - rightX - pad;
  if (rightW >= 160) {
    drawCellRow('last 12h', quilt.last12.slice(0, 10), rightX - labelW, labelW, y, rightW, 18, palette, 10);
    drawCellRow('last 12h', quilt.last12.slice(10, 20), rightX - labelW, labelW, y + 28, rightW, 18, palette, 10);
    drawCellRow('last 12h', quilt.last12.slice(20, 30), rightX - labelW, labelW, y + 56, rightW, 18, palette, 10);
    drawCellRow('prior 12h', quilt.prior12, rightX - labelW, labelW, y + 90, rightW, 24, palette, 2);
    y += squareSize + gap + 10;
  } else {
    y += squareSize + gap;
    y = drawCellRow('last 12h', quilt.last12.slice(0, 10), pad, labelW, y, usableW, 16, palette, 10) + 4;
    y = drawCellRow('last 12h', quilt.last12.slice(10, 20), pad, labelW, y, usableW, 16, palette, 10) + 4;
    y = drawCellRow('last 12h', quilt.last12.slice(20, 30), pad, labelW, y, usableW, 16, palette, 10) + 4;
    y = drawCellRow('prior 12h', quilt.prior12, pad, labelW, y, usableW, 20, palette, 2) + gap;
  }
  y = drawCellRow('previous day', quilt.previousDay, pad, labelW, y, usableW, Math.max(14, Math.min(22, height * 0.04)), palette, 24) + gap;
  drawCellRow('day before', quilt.dayBefore, pad, labelW, y, usableW, Math.max(14, Math.min(22, height * 0.04)), palette, 24);
  drawLegend(palette, pad, height - 24);
  artCtx.restore();
}

function drawQuiltTitle(palette, x, y, width) {
  artCtx.fillStyle = palette.line;
  artCtx.font = '700 18px Arial';
  artCtx.fillText('Sound Quilt Horizon', x, y + 16);
  artCtx.globalAlpha = 0.72;
  artCtx.font = '12px Arial';
  if (width > 720) {
    artCtx.fillText('Color and fill show relative sound intensity over time — glanceable quiet, ambient life, and noise pollution.', x + 190, y + 16);
  } else {
    artCtx.fillText('Intensity over seconds, minutes, hours, and days.', x, y + 32);
  }
  artCtx.globalAlpha = 1;
}

function drawCellRow(label, cells, x, labelW, y, width, height, palette, columns) {
  artCtx.fillStyle = 'rgba(255,255,255,0.72)';
  artCtx.font = '12px Arial';
  artCtx.textBaseline = 'middle';
  artCtx.fillText(label, x, y + height / 2);
  const startX = x + labelW;
  const cellW = width / Math.max(1, columns);
  cells.forEach((cell, index) => drawIntensityCell(cell, startX + index * cellW, y, Math.max(1, cellW - 1), height, palette));
  return y + height;
}

function drawHourEpilogue(cells, x, labelW, y, size, palette) {
  artCtx.fillStyle = 'rgba(255,255,255,0.72)';
  artCtx.font = '12px Arial';
  artCtx.textBaseline = 'top';
  artCtx.fillText('last hour epilogue', x, y + 4);
  const gridX = x + labelW;
  const cell = size / 10;
  cells.forEach((item, index) => {
    const cx = gridX + (index % 10) * cell;
    const cy = y + Math.floor(index / 10) * cell;
    drawIntensityCell(item, cx, cy, Math.max(1, cell - 1), Math.max(1, cell - 1), palette);
  });
  for (let segment = 1; segment < 6; segment++) {
    const index = Math.round(segment * 100 / 6);
    const sx = gridX + (index % 10) * cell;
    const sy = y + Math.floor(index / 10) * cell;
    artCtx.strokeStyle = 'rgba(255,255,255,0.28)';
    artCtx.beginPath();
    artCtx.moveTo(sx, sy);
    artCtx.lineTo(gridX + size, sy);
    artCtx.stroke();
  }
  drawMiniLine(cells, gridX, y, size, size, palette.line);
}

function drawIntensityCell(item, x, y, width, height, palette) {
  const sample = normalizeSample(item);
  const fill = Math.max(0, Math.min(1, item.fillRatio ?? sample.averageEnergy / 180));
  artCtx.fillStyle = 'rgba(255,255,255,0.055)';
  artCtx.fillRect(x, y, width, height);
  if (item.empty || fill <= 0) return;
  artCtx.fillStyle = colorForSample(sample, palette);
  artCtx.globalAlpha = 0.88;
  const fillHeight = Math.max(1, height * fill);
  artCtx.fillRect(x, y + height - fillHeight, width, fillHeight);
  artCtx.globalAlpha = 1;
}

function drawMiniLine(cells, x, y, width, height, color) {
  const values = cells.map(cell => normalizeSample(cell).averageEnergy);
  const max = Math.max(...values, 1);
  artCtx.save();
  artCtx.strokeStyle = color;
  artCtx.globalAlpha = 0.72;
  artCtx.lineWidth = 1.5;
  artCtx.beginPath();
  values.forEach((value, index) => {
    const px = x + (index / Math.max(1, values.length - 1)) * width;
    const py = y + height - (value / max) * height;
    if (index === 0) artCtx.moveTo(px, py);
    else artCtx.lineTo(px, py);
  });
  artCtx.stroke();
  artCtx.restore();
}

function drawLegend(palette, x, y) {
  const labels = INTENSITY_CLASSES.slice(0, -1).concat(INTENSITY_CLASSES.slice(-1));
  let cursor = x;
  artCtx.font = '11px Arial';
  artCtx.textBaseline = 'middle';
  labels.forEach(item => {
    const key = item.label.toLowerCase();
    artCtx.fillStyle = palette[key] || palette.accent;
    artCtx.fillRect(cursor, y - 6, 12, 12);
    artCtx.fillStyle = 'rgba(255,255,255,0.72)';
    artCtx.fillText(item.label, cursor + 16, y);
    cursor += 78;
  });
}


function drawTimeGuides(items, palette, width, height, focusIndex = -1) {
  const times = items.map(item => safeTime(item)).filter(Number.isFinite);
  if (!times.length) return;
  const blockW = width / items.length;
  artCtx.save();
  artCtx.globalAlpha = 0.9;
  artCtx.strokeStyle = 'rgba(255,255,255,0.16)';
  artCtx.fillStyle = 'rgba(255,255,255,0.72)';
  artCtx.font = '12px Arial';
  artCtx.textBaseline = 'top';
  const guideIndexes = pickGuideIndexes(items, width);
  guideIndexes.forEach(index => {
    const item = items[index];
    const x = Math.min(width - 1, index * blockW);
    artCtx.beginPath();
    artCtx.moveTo(x, 0);
    artCtx.lineTo(x, height);
    artCtx.stroke();
    const label = formatTimeGuide(item, items);
    artCtx.save();
    artCtx.translate(Math.min(width - 86, x + 4), 8 + (index % 2) * 18);
    artCtx.fillStyle = palette.line;
    artCtx.fillText(label, 0, 0);
    artCtx.restore();
  });
  if (focusIndex >= 0 && focusIndex < items.length) {
    const x = focusIndex * blockW + blockW / 2;
    artCtx.strokeStyle = palette.accent;
    artCtx.lineWidth = 2;
    artCtx.beginPath();
    artCtx.moveTo(x, 0);
    artCtx.lineTo(x, height);
    artCtx.stroke();
  }
  artCtx.restore();
}

function pickGuideIndexes(items, width) {
  const targetCount = Math.max(4, Math.min(12, Math.floor(width / 140)));
  const indexes = new Set([0, items.length - 1]);
  const starts = items.map(item => safeTime(item));
  const start = starts[0];
  const end = starts[starts.length - 1];
  const span = end - start;
  if (span > ONE_HOUR_MS) {
    const interval = span <= 6 * ONE_HOUR_MS ? 30 * ONE_MINUTE_MS : ONE_HOUR_MS;
    let marker = Math.ceil(start / interval) * interval;
    while (marker <= end) {
      indexes.add(nearestIndex(starts, marker));
      marker += interval;
    }
  }
  const step = Math.max(1, Math.floor(items.length / targetCount));
  for (let index = 0; index < items.length; index += step) indexes.add(index);
  return Array.from(indexes).filter(index => index >= 0 && index < items.length).sort((a, b) => a - b);
}

function nearestIndex(times, target) {
  let best = 0;
  times.forEach((time, index) => {
    if (Math.abs(time - target) < Math.abs(times[best] - target)) best = index;
  });
  return best;
}

function formatTimeGuide(item, items) {
  const date = new Date(item.startTime || item.timestamp);
  const first = new Date(items[0].startTime || items[0].timestamp);
  const last = new Date(items[items.length - 1].endTime || items[items.length - 1].timestamp);
  const showDate = first.toDateString() !== last.toDateString();
  return date.toLocaleString([], showDate ? { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' } : { hour: 'numeric', minute: '2-digit' });
}

function updateTimeHud(items, focusIndex) {
  if (!timeHud) return;
  if (!items || !items.length) {
    timeHud.innerHTML = 'Timeline ready — record audio, then hover the artwork to inspect exact moments like 2:00 PM or 2:30 PM.';
    return;
  }
  const item = items[Math.max(0, Math.min(items.length - 1, focusIndex ?? items.length - 1))];
  const sample = normalizeSample(item);
  const range = `${formatDateTime(item.startTime || item.timestamp)} → ${formatDateTime(item.endTime || item.timestamp)}`;
  const band = dominantBand(sample);
  timeHud.innerHTML = `<strong>${focusIndex === null ? 'Latest visible moment' : 'Inspecting moment'}</strong><br>${range}<br>Energy ${sample.averageEnergy.toFixed(1)} · ${intensityClass(sample.averageEnergy).label} · dominant ${band.label}`;
}

function formatDateTime(value) {
  const time = Date.parse(value);
  if (!Number.isFinite(time)) return 'unknown time';
  return new Date(time).toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', second: '2-digit' });
}

function inspectArtAt(clientX) {
  if (!lastArtRender || !lastArtRender.items.length) return;
  const rect = artCanvas.getBoundingClientRect();
  const x = Math.max(0, Math.min(rect.width, clientX - rect.left));
  const index = Math.min(lastArtRender.items.length - 1, Math.floor((x / Math.max(1, rect.width)) * lastArtRender.items.length));
  renderArt(lastArtRender.model);
  updateTimeHud(lastArtRender.items, index);
}


function chooseArtComposites(model, width) {
  if (!model || !model.samples || !model.samples.length) return [];
  const maxBlocks = Math.max(24, Math.floor(width / 8));
  const options = [model.seconds, model.minutes, model.hours, model.days, model.months].filter(items => items && items.length);
  if (options.length) return options.find(items => items.length <= maxBlocks) || options[options.length - 1];
  return bucketSamples(model.samples, Math.ceil((safeTime(model.samples[model.samples.length - 1]) - safeTime(model.samples[0])) / maxBlocks));
}

function renderStory(items, palette, width, height) {
  const maxEnergy = Math.max(...items.map(item => normalizeSample(item).cumulativeEnergy), 1);
  const blockW = width / items.length;
  items.forEach((item, i) => {
    const sample = normalizeSample(item);
    const h = Math.max(3, Math.sqrt(sample.cumulativeEnergy / maxEnergy) * height * 0.82);
    const x = i * blockW;
    const y = height - h;
    artCtx.fillStyle = colorForSample(sample, palette);
    artCtx.globalAlpha = 0.88;
    artCtx.fillRect(x, y, Math.max(1, blockW - 1), h);
    drawProfileLine(sample.profile, x, y + 8, Math.max(1, blockW - 1), Math.max(10, h - 16), palette.line);
  });
  artCtx.globalAlpha = 1;
}

function renderShape(items, palette, width, height) {
  const blockW = width / items.length;
  items.forEach((item, i) => {
    const sample = normalizeSample(item);
    artCtx.fillStyle = palette.ambient;
    artCtx.globalAlpha = 0.72;
    drawProfileShape(sample.profile, i * blockW, height * 0.1, Math.max(1, blockW - 1), height * 0.8, palette.line);
  });
  artCtx.globalAlpha = 1;
}

function renderColor(items, palette, width, height) {
  const blockW = width / items.length;
  items.forEach((item, i) => {
    const sample = normalizeSample(item);
    artCtx.fillStyle = colorForSample(sample, palette);
    artCtx.fillRect(i * blockW, 0, Math.ceil(blockW), height);
  });
}

function renderScale(items, palette, width, height) {
  const rand = seededRandom(artConfig.seed);
  const maxEnergy = Math.max(...items.map(item => normalizeSample(item).cumulativeEnergy), 1);
  const blockW = width / items.length;
  items.forEach((item, i) => {
    const sample = normalizeSample(item);
    const radius = Math.max(2, Math.sqrt(sample.cumulativeEnergy / maxEnergy) * Math.min(blockW, height) * 0.75);
    artCtx.fillStyle = palette.accent;
    artCtx.globalAlpha = 0.25 + (sample.averageEnergy / 255) * 0.65;
    artCtx.beginPath();
    artCtx.arc(i * blockW + blockW / 2, height * (0.3 + rand() * 0.4), radius, 0, Math.PI * 2);
    artCtx.fill();
  });
  artCtx.globalAlpha = 1;
}

function renderWeave(items, palette, width, height) {
  const rand = seededRandom(artConfig.seed);
  const maxEnergy = Math.max(...items.map(item => normalizeSample(item).cumulativeEnergy), 1);
  const blockW = width / Math.max(1, items.length - 1);
  for (let pass = 0; pass < 4; pass++) {
    artCtx.beginPath();
    items.forEach((item, i) => {
      const sample = normalizeSample(item);
      const profile = sample.profile[pass % sample.profile.length] || sample.averageEnergy;
      const x = i * blockW;
      const y = height * (0.18 + pass * 0.18) + Math.sin(i * 0.7 + rand() * 2) * 14 - profile * 0.35;
      if (i === 0) artCtx.moveTo(x, y); else artCtx.lineTo(x, y);
      artCtx.strokeStyle = colorForSample(sample, palette);
      artCtx.lineWidth = 1 + (sample.cumulativeEnergy / maxEnergy) * 18;
    });
    artCtx.globalAlpha = 0.65;
    artCtx.stroke();
  }
  artCtx.globalAlpha = 1;
}

function drawProfileLine(profile, x, y, width, height, color) {
  const max = Math.max(...profile, 1);
  artCtx.strokeStyle = color;
  artCtx.lineWidth = 1.5;
  artCtx.globalAlpha = 0.8;
  artCtx.beginPath();
  profile.forEach((value, i) => {
    const px = x + (i / Math.max(1, profile.length - 1)) * width;
    const py = y + height - (value / max) * height;
    if (i === 0) artCtx.moveTo(px, py); else artCtx.lineTo(px, py);
  });
  artCtx.stroke();
}

function drawProfileShape(profile, x, y, width, height, lineColor) {
  const max = Math.max(...profile, 1);
  artCtx.beginPath();
  artCtx.moveTo(x, y + height);
  profile.forEach((value, i) => {
    artCtx.lineTo(x + (i / Math.max(1, profile.length - 1)) * width, y + height - (value / max) * height);
  });
  artCtx.lineTo(x + width, y + height);
  artCtx.closePath();
  artCtx.fill();
  artCtx.strokeStyle = lineColor;
  artCtx.stroke();
}

function colorForSample(sample, palette) {
  if (artConfig.colorBy === 'frequency') {
    const index = dominantBand(sample).index;
    return [palette.quiet, palette.ambient, palette.moderate, palette.loud, palette.louder, palette.loudest, palette.accent, palette.line, palette.moderate, palette.ambient][index] || palette.accent;
  }
  return palette[intensityClass(sample.averageEnergy).label.toLowerCase()] || palette.accent;
}

function intensityClass(energy) {
  return INTENSITY_CLASSES.find(item => energy <= item.max) || INTENSITY_CLASSES[INTENSITY_CLASSES.length - 1];
}

function dominantBand(sample) {
  const bands = normalizeSample(sample).bands || [];
  let index = 0;
  bands.forEach((value, i) => { if (value > (bands[index] || 0)) index = i; });
  return { index, label: BAND_LABELS[index] || 'Unknown', value: bands[index] || 0 };
}

function hashSeed(seed) {
  return String(seed).split('').reduce((hash, char) => ((hash << 5) - hash + char.charCodeAt(0)) >>> 0, 2166136261);
}

function seededRandom(seed) {
  let state = hashSeed(seed) || 1;
  return function() {
    state = (state * 1664525 + 1013904223) >>> 0;
    return state / 4294967296;
  };
}

function coerceEnergy(...values) {
  const value = values.find(candidate => Number.isFinite(candidate));
  return value === undefined ? 0 : value;
}

function averageScalars(values) {
  if (!values.length) return 0;
  return values.reduce((sum, value) => sum + value, 0) / values.length;
}

function averageVectors(vectors) {
  const sums = Array(BAND_COUNT).fill(0);
  if (!vectors.length) return sums;
  vectors.forEach(vector => vector.forEach((value, i) => sums[i] += value));
  return sums.map(sum => sum / vectors.length);
}

function buildProfile(samples) {
  const profile = Array(PROFILE_POINTS).fill(0);
  const counts = Array(PROFILE_POINTS).fill(0);
  if (!samples.length) return profile;
  samples.forEach((sample, index) => {
    const profileSource = sample.profile && sample.profile.length ? sample.profile : [sample.energy || 0];
    profileSource.forEach((value, pointIndex) => {
      const slot = Math.min(PROFILE_POINTS - 1, Math.floor(((index + pointIndex / profileSource.length) / samples.length) * PROFILE_POINTS));
      profile[slot] += value;
      counts[slot] += 1;
    });
  });
  return profile.map((value, i) => counts[i] ? value / counts[i] : 0);
}

function averageEnergy(values) {
  if (!values.length) return 0;
  return values.reduce((sum, value) => sum + value, 0) / values.length;
}

function childEnergyProfile(item) {
  return buildProfile((item.children && item.children.length ? item.children : [item]).map(normalizeSample));
}

function toTime(sample) {
  const value = sample && (sample.startTime || sample.timestamp || sample.endTime);
  const time = value ? Date.parse(value) : NaN;
  return Number.isFinite(time) ? time : NaN;
}

function safeTime(sample) {
  const time = toTime(sample);
  return Number.isFinite(time) ? time : 0;
}

function formatLabel(item) {
  if (item.label) return item.label;
  const start = new Date(item.startTime || item.timestamp).toLocaleTimeString();
  const end = new Date(item.endTime || item.timestamp).toLocaleTimeString();
  return start === end ? start : `${start}-${end}`;
}

function primaryEnergy(item, sample) {
  return coerceEnergy(item.energy, item.averageEnergy, item.level, item.primaryEnergy, sample.energy);
}

function scalarEnergySpread(sample) {
  return Math.max(0, sample.maxEnergy - sample.minEnergy);
}

function valuesForMode(item, mode) {
  const sample = normalizeSample(item);
  if (mode === 'range') return [primaryEnergy(item, sample), scalarEnergySpread(sample)];
  if (mode === 'shape') return sample.profile;
  if (mode === 'nested') return childEnergyProfile(sample);
  return [primaryEnergy(item, sample)];
}

function redrawChart(chart, data, mode) {
  if (!chart) return;
  const isRangeView = mode === 'range';
  const isProfileView = mode === 'shape' || mode === 'nested';
  const datasetCount = isRangeView ? 2 : (isProfileView ? PROFILE_POINTS : 1);
  chart.data.labels = data.map(formatLabel);
  const values = data.map(item => valuesForMode(item, mode));
  while (chart.data.datasets.length < datasetCount) chart.data.datasets.push({ label: '', data: [], backgroundColor: '', stack: 'energy' });
  chart.data.datasets.length = datasetCount;
  chart.data.datasets.forEach((dataset, i) => {
    dataset.label = datasetLabel(mode, i);
    dataset.data = values.map(value => value[i] || 0);
    dataset.backgroundColor = datasetColor(mode, i);
    dataset.stack = isProfileView ? 'profile' : 'energy';
  });
  chart.update();
}

function datasetLabel(mode, index) {
  if (mode === 'range') return index === 0 ? 'Average Energy' : 'Variation';
  if (mode === 'shape' || mode === 'nested') return `Profile ${index + 1}`;
  return 'Energy';
}

function datasetColor(mode, index) {
  if (mode === 'range') return index === 0 ? 'rgba(0, 200, 255, 0.45)' : 'rgba(255, 255, 255, 0.22)';
  if (mode === 'shape' || mode === 'nested') return `hsla(${210 + index * 8},70%,${35 + index * 4}%,0.45)`;
  return 'rgba(0, 200, 255, 0.45)';
}

function clearDisplays() {
  charts.forEach(chart => {
    chart.data.labels = [];
    chart.data.datasets.forEach(ds => ds.data = []);
    chart.update();
  });
}

Object.keys(configControls).forEach(id => document.getElementById(id).addEventListener('change', readConfigControls));
document.getElementById('artSeed').addEventListener('input', readConfigControls);
artCanvas.addEventListener('mousemove', event => inspectArtAt(event.clientX));
artCanvas.addEventListener('mouseleave', () => { if (lastArtRender) { renderArt(lastArtRender.model); updateTimeHud(lastArtRender.items, null); } });
window.addEventListener('resize', resizeArtCanvas);
applyConfig();
initCharts();
resizeArtCanvas();
</script>
