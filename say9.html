<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SayIt Studio v9.0</title>
<style>
:root {
  --bg: #09090b; --surface: #18181b; --surface2: #111827; --surface3: #27272a;
  --border: #27272a; --border2: #3f3f46; --text: #f4f4f5; --muted: #a1a1aa;
  --accent: #14b8a6; --ok: #22c55e; --warn: #f59e0b; --danger: #ef4444;
  --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  --sans: Inter, system-ui, -apple-system, sans-serif;
  --headerH: 58px; --footerH: 34px; --sidebarW: 290px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 14px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

header { height: var(--headerH); background: var(--surface); border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 42px auto 1fr; gap: 10px; align-items: center; padding: 0 12px; flex-shrink: 0; z-index: 100; }
.logo { font-size: 18px; font-weight: 700; white-space: nowrap; }
.logo span { color: var(--accent); }
.tab-nav { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
.tab-nav::-webkit-scrollbar { display: none; }

.tab-btn, .icon-btn, .btn { border: 1px solid var(--border2); background: var(--surface2); color: var(--text); border-radius: 12px; cursor: pointer; transition: .18s; font-weight: 700; }
.tab-btn { padding: 0 12px; height: 38px; font-size: 12px; white-space: nowrap; }
.tab-btn.active { background: var(--accent); color: #041414; border-color: transparent; }
.icon-btn { width: 38px; height: 38px; font-size: 17px; display: flex; align-items: center; justify-content: center; }
.btn { padding: 0 16px; min-height: 38px; font-size: 13px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
.btn-primary { background: var(--accent); color: #041414; border: none; }
.btn-danger { background: #450a0a; color: #fecaca; border: none; }

.app { flex: 1; display: flex; overflow: hidden; }
.view { display: none; width: 100%; height: 100%; }
.view.active { display: flex; }
.sidebar { width: var(--sidebarW); min-width: var(--sidebarW); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: .2s; }
.sidebar.collapsed { width: 0; min-width: 0; border-right: none; opacity: 0; overflow: hidden; }
.sidebar-header { padding: 14px; border-bottom: 1px solid var(--border); font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
.sidebar-content { flex: 1; overflow-y: auto; padding: 12px; }

.main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
.content-area { flex: 1; overflow-y: auto; padding: 24px; }
.split-bottom { height: 40%; min-height: 220px; background: var(--bg); border-top: 1px solid var(--border); padding: 16px; overflow-y: auto; display: flex; flex-direction: column; }

.section-title { font-size: 18px; font-weight: 800; margin-bottom: 14px; }
.list-item { padding: 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: .1s; }
.list-item.active { border-color: var(--accent); background: #0f2624; }
.list-item strong { display: block; font-size: 14px; }
.list-item span { font-size: 11px; color: var(--muted); font-family: var(--mono); }

.input-group { margin-bottom: 16px; }
.input-group label { display: block; font-size: 11px; font-weight: 800; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; }
.input, .textarea { width: 100%; background: #09090b; border: 1px solid var(--border2); border-radius: 10px; padding: 12px; color: var(--text); font-size: 14px; outline: none; }
.textarea { min-height: 100px; font-family: var(--mono); line-height: 1.5; resize: vertical; }
.code-block { background: #000; border: 1px solid var(--border2); border-radius: 12px; padding: 16px; font-family: var(--mono); font-size: 12px; color: #d1d5db; line-height: 1.6; overflow: auto; white-space: pre; user-select: all; }

.footer { height: var(--footerH); background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: center; padding: 0 12px; font-size: 11px; color: var(--muted); font-family: var(--mono); gap: 15px; flex-shrink: 0; }
#toast { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 10px 20px; border-radius: 8px; font-weight: 700; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; }
#toast.show { opacity: 1; bottom: 70px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
.status-idle { background: var(--muted); }
.status-run { background: var(--warn); }
.status-ok { background: var(--ok); }
</style>
</head>
<body>

<header>
  <button class="icon-btn" onclick="toggleSidebar()">☰</button>
  <div class="logo">Say<span>It</span> v9.0</div>
  <nav class="tab-nav">
    <button class="tab-btn active" data-view="install">Install</button>
    <button class="tab-btn" data-view="config">Config</button>
    <button class="tab-btn" data-view="calibrate">Calibrate</button>
    <button class="tab-btn" data-view="hub">Unified Hub</button>
    <button class="tab-btn" data-view="logs">System Logs</button>
  </nav>
</header>

<div class="app">
  <!-- INSTALL TAB -->
  <section class="view active" id="view-install">
    <aside class="sidebar">
      <div class="sidebar-header">Technical Package</div>
      <div class="sidebar-content">
        <div class="list-item active" onclick="setInstallView('java')"><strong>MainActivity.java</strong><span>Context Courier Source</span></div>
        <div class="list-item" onclick="setInstallView('xml')"><strong>AndroidManifest.xml</strong><span>System Permissions</span></div>
        <div class="list-item" onclick="setInstallView('guide')"><strong>Instructions</strong><span>Build Guide</span></div>
      </div>
    </aside>
    <main class="main">
      <div class="content-area" id="installContent"></div>
    </main>
  </section>

  <!-- CONFIG TAB -->
  <section class="view" id="view-config">
    <main class="main">
      <div class="content-area" style="max-width:800px; margin:0 auto">
        <div class="section-title">Pipeline Configuration</div>
        <div style="background:var(--surface2); padding:24px; border-radius:16px; border:1px solid var(--border)">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px">
            <div class="input-group"><label>GitHub User</label><input type="text" class="input" id="cfgUser" placeholder="username"></div>
            <div class="input-group"><label>GitHub Repo</label><input type="text" class="input" id="cfgRepo" placeholder="repo"></div>
          </div>
          <div class="input-group"><label>GitHub PAT (Secret)</label><input type="password" class="input" id="cfgPat"></div>
          <div class="input-group"><label>Wake Phrase</label><input type="text" class="input" id="cfgWake" value="SayIt"></div>
          <button class="btn btn-primary" onclick="saveSettings()" style="width:100%; height:48px">Save Registry</button>
        </div>
      </div>
    </main>
  </section>

  <!-- CALIBRATE TAB -->
  <section class="view" id="view-calibrate">
    <aside class="sidebar">
      <div class="sidebar-header">AI Environments</div>
      <div class="sidebar-content" id="adapterList"></div>
    </aside>
    <main class="main">
      <div class="content-area" id="calibrateEditor"></div>
    </main>
  </section>

  <!-- UNIFIED HUB TAB -->
  <section class="view" id="view-hub">
    <aside class="sidebar">
      <div class="sidebar-header">Job Pipeline <button class="btn btn-primary" style="padding:4px 8px; font-size:10px" onclick="addJob()">+</button></div>
      <div class="sidebar-content" id="jobList"></div>
    </aside>
    <main class="main">
      <div class="content-area" id="hubEditor"></div>
      <div class="split-bottom">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
          <label style="font-size:11px; font-weight:800; color:var(--muted)">DEPLOYMENT BUFFER</label>
          <div style="display:flex; gap:8px">
            <button class="btn" style="padding:4px 12px; font-size:11px" onclick="manualSync()">Manual Sync</button>
            <button class="btn btn-primary" style="padding:4px 12px; font-size:11px" onclick="shipToGithub()">🚀 PUSH TO GITHUB</button>
          </div>
        </div>
        <textarea class="textarea mono" id="hubResponseArea" readonly placeholder="Output streams here via Learning Agent..." style="flex:1"></textarea>
      </div>
    </main>
  </section>

  <!-- LOGS TAB -->
  <section class="view" id="view-logs">
    <main class="main">
      <div class="content-area">
        <div class="section-title">System Diagnostics</div>
        <div class="code-block" id="systemLogs" style="height:100%; min-height:400px"></div>
      </div>
    </main>
  </section>
</div>

<footer class="footer" id="master-footer"></footer>
<div id="toast">Message</div>

<script>
let state = {
  config: { user: '', repo: '', pat: '', wake: 'SayIt' },
  adapters: [
    { id: 'gemini', name: 'Gemini', url: 'https://gemini.google.com/app' },
    { id: 'chatgpt', name: 'ChatGPT', url: 'https://chatgpt.com' }
  ],
  jobs: [
    { id: 'tictactoe', name: 'Tic-Tac-Toe Match', file: 'tictactoe.html', prompt: 'build a self-contained HTML5 file with inline JS that is a two-player tic-tac-toe game that will keep track of a match best two out of three', response: '', issues: '', status: 'idle' }
  ],
  selectedJobId: 'tictactoe',
  selectedAdapterId: 'gemini',
  sidebarCollapsed: false,
  installView: 'java'
};

function init() {
  const raw = localStorage.getItem('sayit_v9_state');
  if (raw) {
    try { state = Object.assign(state, JSON.parse(raw)); } catch (e) {}
  }
  setupTabs();
  renderAll();
  setupVoice();
  log("System Initialized.");
}

function save() {
  localStorage.setItem('sayit_v9_state', JSON.stringify(state));
  renderAll();
}

function log(msg) {
  const el = document.getElementById('systemLogs');
  if (el) {
    const timestamp = new Date().toLocaleTimeString();
    el.innerHTML = `[${timestamp}] ${msg}\n` + el.innerHTML;
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function setupTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn, .view').forEach(el => el.classList.remove('active'));
      btn.classList.add('active');
      const viewId = 'view-' + btn.dataset.view;
      const viewEl = document.getElementById(viewId);
      if (viewEl) viewEl.classList.add('active');
    });
  });
}

function toggleSidebar() {
  state.sidebarCollapsed = !state.sidebarCollapsed;
  save();
}

function renderAll() {
  document.querySelectorAll('.sidebar').forEach(el => {
    el.classList.toggle('collapsed', state.sidebarCollapsed);
  });

  document.getElementById('cfgUser').value = state.config.user;
  document.getElementById('cfgRepo').value = state.config.repo;
  document.getElementById('cfgPat').value = state.config.pat;
  document.getElementById('cfgWake').value = state.config.wake;

  renderInstallContent();
  renderAdapters();
  renderJobPipeline();
  renderHub();
  renderFooter();
}

function renderFooter() {
  const status = window.AndroidHelper ? "BRIDGE CONNECTED" : "STANDALONE";
  document.getElementById('master-footer').innerText = `SayIt Studio v9.0 | ${new Date().toLocaleString()} | ${status}`;
}

function setInstallView(view) {
  state.installView = view;
  save();
}

function renderInstallContent() {
  const el = document.getElementById('installContent');
  if (!el) return;

  const activeItems = document.querySelectorAll('#view-install .list-item');
  activeItems.forEach(item => item.classList.remove('active'));
  const currentItem = Array.from(activeItems).find(item => item.getAttribute('onclick').includes(`'${state.installView}'`));
  if (currentItem) currentItem.classList.add('active');

  if (state.installView === 'java') {
    el.innerHTML = `<div class="section-title">MainActivity.java</div>
      <div class="code-block">package com.sayit.v9;

import android.app.Activity;
import android.os.Bundle;
import android.webkit.*;
import android.content.*;
import org.json.*;

public class MainActivity extends Activity {
    private WebView webView;
    private String activePrompt = "";

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        webView = new WebView(this);
        WebSettings s = webView.getSettings();
        s.setJavaScriptEnabled(true);
        s.setDomStorageEnabled(true);
        s.setMediaPlaybackRequiresUserGesture(false);

        webView.setWebChromeClient(new WebChromeClient() {
            @Override
            public void onPermissionRequest(PermissionRequest request) {
                request.grant(request.getResources());
            }
        });

        webView.setWebViewClient(new CourierClient());
        webView.addJavascriptInterface(new AndroidHelper(), "AndroidHelper");
        setContentView(webView);
        
        // UPDATE TO YOUR GITHUB PAGES URL
        webView.loadUrl("https://YOUR_USER.github.io/YOUR_REPO/index.html");
    }

    private class CourierClient extends WebViewClient {
        @Override
        public void onPageFinished(WebView view, String url) {
            if (!activePrompt.isEmpty() && !url.contains("github.io")) {
                String js = "(function(){ " +
                    "let box = document.querySelector('[role=\"textbox\"]') || document.querySelector('textarea'); " +
                    "if(box){ " +
                    "  box.focus(); " +
                    "  document.execCommand('insertText', false, '" + activePrompt.replace("'", "\\\\\\'").replace("\\n", "\\\\n") + "'); " +
                    "  setTimeout(() => { " +
                    "    let btn = document.querySelector('button[aria-label*=\"Send\"]') || document.querySelector('[data-testid*=\"send\"]'); " +
                    "    if(btn) btn.click(); " +
                    "  }, 1000); " +
                    "} " +
                    "})();";
                view.evaluateJavascript(js, null);
                activePrompt = ""; 
            }
        }
    }

    public class AndroidHelper {
        @JavascriptInterface
        public void postMessage(String json) {
            try {
                JSONObject obj = new JSONObject(json);
                String cmd = obj.getString("command");

                if (cmd.equals("orchestrate")) {
                    activePrompt = obj.getString("prompt");
                    runOnUiThread(() -> webView.loadUrl(obj.getString("url")));
                }

                if (cmd.equals("clipboard.read")) {
                    ClipboardManager cb = (ClipboardManager) getSystemService(CLIPBOARD_SERVICE);
                    if (cb.hasPrimaryClip()) {
                        String txt = cb.getPrimaryClip().getItemAt(0).getText().toString();
                        runOnUiThread(() -> webView.loadUrl("javascript:window.receiveEvent('clipboard:' + txt.replace('\"', '\\\\\"'))"));
                    }
                }
            } catch (Exception e) {}
        }
    }
}</div>`;
  } else if (state.installView === 'xml') {
    el.innerHTML = `<div class="section-title">AndroidManifest.xml</div>
      <div class="code-block">&lt;?xml version="1.0" encoding="utf-8"?&gt;
&lt;manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="com.sayit.v9"&gt;

    &lt;uses-permission android:name="android.permission.INTERNET" /&gt;
    &lt;uses-permission android:name="android.permission.RECORD_AUDIO" /&gt;

    &lt;application
        android:label="SayIt Studio v9"
        android:usesCleartextTraffic="true"
        android:theme="@android:style/Theme.NoTitleBar"&gt;
        
        &lt;activity
            android:name=".MainActivity"
            android:exported="true"
            android:windowSoftInputMode="adjustResize"&gt;
            &lt;intent-filter&gt;
                &lt;action android:name="android.intent.action.MAIN" /&gt;
                &lt;category android:name="android.intent.category.LAUNCHER" /&gt;
            &lt;/intent-filter&gt;
        &lt;/activity&gt;
    &lt;/application&gt;
&lt;/manifest&gt;</div>`;
  } else {
    el.innerHTML = `<div class="section-title">Operating Instructions</div>
      <div style="background:var(--surface2); padding:20px; border-radius:12px; line-height:1.8">
        1. Compile the APK using the provided Java and XML in AIDE.<br>
        2. Host this HTML file on GitHub Pages.<br>
        3. Enter your PAT, Repo, and Username in the Config tab.<br>
        4. Select a Job in the Hub and tap 🚀 START JOB.<br>
        5. The bridge will inject the prompt automatically.
      </div>`;
  }
}

function renderAdapters() {
  const el = document.getElementById('adapterList');
  if (!el) return;
  el.innerHTML = state.adapters.map(a => 
    `<div class="list-item ${state.selectedAdapterId === a.id ? 'active' : ''}" onclick="state.selectedAdapterId='${a.id}';save()">
      <strong>${a.name}</strong>
    </div>`
  ).join('');

  const activeAdapter = state.adapters.find(a => a.id === state.selectedAdapterId);
  const editor = document.getElementById('calibrateEditor');
  if (activeAdapter && editor) {
    editor.innerHTML = `<div class="section-title">Calibration: ${activeAdapter.name}</div>
      <div style="background:var(--surface2); padding:20px; border-radius:12px">
        <p style="margin-bottom:16px; color:var(--muted)">Open the platform to ensure authentication is complete before running autonomous loops.</p>
        <button class="btn btn-primary" onclick="openAIPlatform('${activeAdapter.url}')">Open AI Platform</button>
      </div>`;
  }
}

function renderJobPipeline() {
  const el = document.getElementById('jobList');
  if (!el) return;
  el.innerHTML = state.jobs.map(j => 
    `<div class="list-item ${state.selectedJobId === j.id ? 'active' : ''}" onclick="state.selectedJobId='${j.id}';save()">
      <span class="status-dot status-${j.status}"></span>
      <strong>${j.name}</strong>
      <span>${j.file}</span>
    </div>`
  ).join('');
}

function renderHub() {
  const j = state.jobs.find(x => x.id === state.selectedJobId);
  const editor = document.getElementById('hubEditor');
  const responseArea = document.getElementById('hubResponseArea');
  
  if (!j || !editor) return;

  editor.innerHTML = `
    <div class="section-title" style="display:flex; justify-content:space-between">
      <span>Job: ${j.name}</span>
      <span style="font-size:12px; color:var(--muted)">Target: ${j.file}</span>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px">
      <div style="background:var(--surface2); border:1px solid var(--border); border-radius:16px; padding:20px">
        <div class="input-group">
          <label>Requirement Prompt</label>
          <textarea class="textarea" onchange="updateJob('prompt', this.value)">${j.prompt}</textarea>
        </div>
        <button class="btn btn-primary" style="width:100%; height:50px" onclick="runAutonomousChain()">🚀 START JOB</button>
      </div>
      <div style="background:var(--surface2); border:1px solid var(--border); border-radius:16px; padding:20px">
        <div class="input-group">
          <label>Issue Log (Overrides)</label>
          <textarea class="textarea" id="fixLog" placeholder="Document issues for refinement...">${j.issues}</textarea>
        </div>
        <div style="display:flex; gap:10px">
          <button class="btn" style="flex:1" onclick="applyFix()">FIX LOGIC</button>
          <button class="btn btn-danger" style="flex:1" onclick="redoFail()">REDO RUN</button>
        </div>
      </div>
    </div>
  `;
  if (responseArea) responseArea.value = j.response || '';
}

function updateJob(key, value) {
  const j = state.jobs.find(x => x.id === state.selectedJobId);
  if (j) { j[key] = value; save(); }
}

function addJob() {
  const name = prompt("Enter Project Name:");
  if (!name) return;
  const id = 'job-' + Date.now();
  state.jobs.unshift({
    id: id, name: name, file: name.toLowerCase().replace(/\s+/g, '-') + '.html',
    prompt: '', response: '', issues: '', status: 'idle'
  });
  state.selectedJobId = id;
  save();
}

function saveSettings() {
  state.config.user = document.getElementById('cfgUser').value;
  state.config.repo = document.getElementById('cfgRepo').value;
  state.config.pat = document.getElementById('cfgPat').value;
  state.config.wake = document.getElementById('cfgWake').value;
  save();
  toast("Configuration Saved");
}

function openAIPlatform(url) {
  if (window.AndroidHelper) {
    window.AndroidHelper.postMessage(JSON.stringify({ command: "orchestrate", url: url, prompt: "" }));
  } else {
    window.open(url, '_blank');
  }
}

function runAutonomousChain() {
  const j = state.jobs.find(x => x.id === state.selectedJobId);
  const a = state.adapters.find(x => x.id === state.selectedAdapterId);
  if (!j || !a) return;

  j.status = 'run';
  save();

  if (window.AndroidHelper) {
    window.AndroidHelper.postMessage(JSON.stringify({ command: "orchestrate", url: a.url, prompt: j.prompt }));
    toast("Courier Executing...");
  } else {
    window.open(a.url, '_blank');
    toast("Standalone: Manual Copy Mode");
  }
}

function applyFix() {
  const j = state.jobs.find(x => x.id === state.selectedJobId);
  const fix = document.getElementById('fixLog').value;
  if (j && fix) {
    const p = `Apply fix to code: ${j.response}. Issue: ${fix}. Output full HTML.`;
    j.prompt = p;
    j.issues = fix;
    save();
    runAutonomousChain();
  }
}

function redoFail() {
  const j = state.jobs.find(x => x.id === state.selectedJobId);
  if (j) {
    j.prompt = "Resending due to error. " + j.prompt;
    j.response = '';
    save();
    runAutonomousChain();
  }
}

function manualSync() {
  if (window.AndroidHelper) {
    window.AndroidHelper.postMessage(JSON.stringify({ command: "clipboard.read" }));
  } else {
    toast("Bridge Not Active");
  }
}

async function shipToGithub() {
  const j = state.jobs.find(x => x.id === state.selectedJobId);
  if (!j || !j.response) return toast("No code to ship");
  if (!state.config.pat) return toast("Setup Config First");

  toast("Pushing to GitHub...");
  log(`Initiating push for ${j.file}...`);
  
  const url = `https://api.github.com/repos/${state.config.user}/${state.config.repo}/contents/${j.file}`;
  const headers = { "Authorization": `token ${state.config.pat}`, "Accept": "application/vnd.github.v3+json" };
  
  try {
    const check = await fetch(url, { headers });
    let sha = check.ok ? (await check.json()).sha : null;
    
    const body = { message: `SayIt v9.0 Sync: ${j.name}`, content: btoa(unescape(encodeURIComponent(j.response))), branch: "main" };
    if (sha) body.sha = sha;
    
    const res = await fetch(url, { method: "PUT", headers, body: JSON.stringify(body) });
    if (res.ok) {
      j.status = 'ok';
      save();
      toast("Successfully Shipped");
      log(`Successfully deployed ${j.file}`);
      window.open(`https://${state.config.user}.github.io/${state.config.repo}/${j.file}`, '_blank');
    } else {
      throw new Error("API Rejected Push");
    }
  } catch (e) {
    log(`Ship Error: ${e.message}`);
    toast("Deployment Failed");
  }
}

window.receiveEvent = function(payload) {
  log(`Received Bridge Signal: ${payload.substring(0, 20)}...`);
  if (payload.startsWith('clipboard:')) {
    const code = payload.split('clipboard:')[1];
    const j = state.jobs.find(x => x.id === state.selectedJobId);
    if (j) {
      j.response = code;
      save();
      toast("Code Synced from Courier");
      shipToGithub();
    }
  }
};

function setupVoice() {
  const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!Speech) return;
  const recognition = new Speech();
  recognition.continuous = true;
  recognition.onresult = (e) => {
    const text = e.results[e.results.length - 1][0].transcript.trim().toLowerCase();
    log(`Voice In: ${text}`);
    if (text.includes(state.config.wake.toLowerCase())) {
      if (text.includes("build") || text.includes("start")) runAutonomousChain();
      if (text.includes("ship") || text.includes("push")) shipToGithub();
      if (text.includes("redo")) redoFail();
    }
  };
  try { recognition.start(); } catch(e) { log("Voice setup failed"); }
}

window.onload = init;
</script>
</body>
