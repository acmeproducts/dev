<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitView</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #1f2430;
      --txt: #ecf0f7;
      --muted: #95a0b5;
      --accent: #4da3ff;
      --danger: #ff5d73;
      --ok: #43c98f;
      --warn: #f8b84a;
    }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Inter, Segoe UI, Roboto, sans-serif; color: var(--txt); background: var(--bg); }
    .shell { max-width: 1700px; margin: 0 auto; padding: 12px; }
    .grid { display:grid; gap:8px; grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); margin-bottom:8px; }
    .field { display:flex; flex-direction:column; gap:4px; }
    label { font-size:11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    input, select, button, textarea { border:1px solid #2b3344; background: var(--panel); color: var(--txt); border-radius:10px; padding:10px; font-size:14px; }
    button { min-height:44px; }
    button:hover { border-color: var(--accent); }
    .row { display:grid; gap:8px; grid-template-columns: 1fr 1fr; margin-bottom:8px; }
    .card { border:1px solid #2b3344; background:var(--panel); border-radius:12px; padding:8px; }
    .hint { color: var(--muted); font-size:12px; }
    .status { font-size:12px; min-height: 1.2em; }
    .status.error { color: var(--danger); }
    .status.ok { color: var(--ok); }

    .toolbar { display:grid; gap:8px; grid-template-columns: repeat(3,minmax(120px,1fr)); margin: 8px 0; }
    .bulkbar {
      position: sticky;
      bottom: 0;
      z-index: 20;
      border:1px solid #2b3344;
      background:#121722;
      border-radius:12px;
      padding:8px;
      margin: 8px 0;
    }
    .bulkbar .toolbar { grid-template-columns: repeat(2,minmax(120px,1fr)); }

    #workspace { display:grid; gap:8px; align-items:start; grid-template-columns: repeat(var(--cols,2), minmax(170px,1fr)); }
    .portlet { border:1px solid #2b3344; border-radius:12px; overflow:hidden; background:var(--panel); min-height:160px; }
    .portlet.minimized .content { display:none; }
    .titlebar { display:flex; gap:6px; align-items:center; justify-content:space-between; background:var(--panel-2); padding:6px; }
    .title { font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width: 52%; }
    .actions { display:flex; gap:4px; }
    .actions button { min-height: 36px; padding: 6px; font-size: 12px; }
    .content { padding: 6px; display:flex; justify-content:center; align-items:center; min-height:120px; }
    .content img, .content iframe { max-width:100%; max-height:220px; border-radius:8px; }
    .meta { border-top:1px solid #2b3344; font-size:11px; color:var(--muted); padding:6px; display:grid; gap:2px; }
    .sel { width:20px; height:20px; }
    .taglist { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
    .tag { font-size:10px; padding:3px 6px; border:1px solid #355; border-radius:999px; color:#bfe3ff; }

    .tray { margin-top: 8px; border:1px solid #2b3344; border-radius:10px; overflow:hidden; }
    .tray h3 { margin:0; font-size:12px; background:var(--panel-2); padding:8px; }
    .tray .list { padding:8px; display:grid; gap:6px; }
    .tray-item { display:grid; grid-template-columns: 1fr auto auto; gap:6px; align-items:center; border:1px solid #2b3344; border-radius:8px; padding:8px; }

    .log { max-height: 220px; overflow:auto; font-size:12px; display:grid; gap:4px; }
    .log-line { border:1px solid #2b3344; border-radius:6px; padding:6px; }

    @media (max-width: 760px) {
      .row, .toolbar, .bulkbar .toolbar { grid-template-columns:1fr; }
      #workspace { grid-template-columns: repeat(var(--cols,1), minmax(150px,1fr)); }
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="grid">
    <div class="field"><label>Repo (owner/repo)</label><input id="repoInput" placeholder="owner/repo or github.com/owner/repo"></div>
    <div class="field"><label>PAT token</label><input id="tokenInput" type="password" placeholder="optional"></div>
    <div class="field"><label>Load repo</label><button id="loadRepoBtn">Load Repository</button></div>
    <div class="field"><label>Folder import fallback</label><input id="folderInput" type="file" webkitdirectory directory multiple></div>
    <div class="field"><label>Collection name</label><input id="collectionName" placeholder="collection name"></div>
    <div class="field"><label>Saved collections</label><select id="collectionPicker"></select></div>
  </div>

  <div class="row">
    <input id="searchInput" placeholder="Search (supports wildcard * and -exclude)">
    <select id="sortBy"><option value="name">Sort name</option><option value="changed">Sort changed</option><option value="size">Sort size</option><option value="commitMessage">Sort description</option></select>
  </div>

  <div class="toolbar">
    <input id="rowsInput" type="number" min="1" value="3" placeholder="Rows per page">
    <input id="colsInput" type="number" min="1" value="2" placeholder="Columns">
    <input id="densityInput" type="range" min="0" max="100" value="0">
    <button id="prevPage">Prev</button>
    <button id="nextPage">Next</button>
    <div id="pageInfo" class="hint">Page 1/1</div>
  </div>

  <div class="card">
    <div class="status" id="status"></div>
    <div class="hint" id="counts">Visible 0 / Selected 0</div>
  </div>

  <div id="bulkbar" class="bulkbar">
    <div class="toolbar">
      <button id="selectVisibleBtn">Select visible</button>
      <button id="selectAllResultsBtn">Select all results</button>
      <button id="clearSelectBtn">Clear selection</button>
      <button id="invertVisibleBtn">Invert visible</button>
      <button id="bulkMinBtn">Bulk minimize/restore</button>
      <button id="bulkRemoveBtn">Bulk remove</button>
      <button id="bulkDeleteBtn">Bulk delete</button>
      <button id="bulkMoveBtn">Bulk move</button>
      <button id="bulkCopyBtn">Bulk copy</button>
      <button id="bulkTagBtn">Bulk tag apply</button>
      <button id="retryFailedBtn">Retry failed</button>
      <button id="undoBtn">Undo last bulk</button>
    </div>
    <div class="row">
      <select id="moveTarget"></select>
      <input id="tagInput" placeholder="tags comma separated">
    </div>
    <div class="row">
      <select id="tagMode"><option value="add">Tag add</option><option value="remove">Tag remove</option><option value="replace">Tag replace</option></select>
      <button id="savePresetBtn">Save bulk preset</button>
    </div>
    <div class="row">
      <select id="presetPicker"></select>
      <button id="runPresetBtn">Run selected preset</button>
    </div>
  </div>

  <div id="workspace"></div>

  <div class="tray"><h3>Minimized</h3><div id="minList" class="list"></div></div>
  <div class="tray"><h3>Removed</h3><div id="removedList" class="list"></div></div>

  <div class="tray">
    <h3>Activity Log</h3>
    <div class="list">
      <div class="toolbar"><button id="exportSelectedBtn">Export selected</button><button id="exportLogBtn">Export activity log</button></div>
      <div id="log" class="log"></div>
    </div>
  </div>
</div>
<script>
(() => {
  const STORAGE_KEY = 'gitview:collections';
  const ACTIVE_KEY = 'gitview:active';
  const PRESET_KEY = 'gitview:presets';
  const LOG_KEY = 'gitview:log';
  const QUEUE_KEY = 'gitview:queue';
  const PAT_KEY = 'gitview:pat';

  const $ = (id) => document.getElementById(id);
  const statusEl = $('status');
  const workspace = $('workspace');
  const state = {
    collections: {}, activeId: null, page: 1, sortDir: 'asc', lastBulkSnapshot: null, failedItems: [], queue: [], logs: [],
  };

  function log(message, level = 'info') {
    const line = { at: new Date().toISOString(), level, message };
    state.logs.unshift(line);
    state.logs = state.logs.slice(0, 300);
    localStorage.setItem(LOG_KEY, JSON.stringify(state.logs));
    renderLog();
  }
  function setStatus(msg, cls = '') { statusEl.textContent = msg; statusEl.className = `status ${cls}`.trim(); }

  function persist() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.collections));
    if (state.activeId) localStorage.setItem(ACTIVE_KEY, state.activeId);
    localStorage.setItem(QUEUE_KEY, JSON.stringify(state.queue));
  }

  function hydrate() {
    try { state.collections = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { state.collections = {}; }
    state.activeId = localStorage.getItem(ACTIVE_KEY) || Object.keys(state.collections)[0] || null;
    try { state.logs = JSON.parse(localStorage.getItem(LOG_KEY) || '[]'); } catch { state.logs = []; }
    try { state.queue = JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]'); } catch { state.queue = []; }
    $('tokenInput').value = localStorage.getItem(PAT_KEY) || '';
  }

  function active() { return state.collections[state.activeId] || null; }

  function parseRepoLike(v) {
    const value = String(v || '').trim().replace(/^https?:\/\//, '').replace(/^www\./, '');
    let m = value.match(/^github\.com\/([\w.-]+)\/([\w.-]+)/i); if (m) return `${m[1]}/${m[2]}`;
    m = value.match(/^([\w.-]+)\/([\w.-]+)/); if (m) return `${m[1]}/${m[2]}`;
    return null;
  }
  function encodePath(path) { return String(path || '').split('/').map(encodeURIComponent).join('/'); }
  function token() { return $('tokenInput').value.trim(); }

  async function fetchJson(url) {
    const headers = { Accept: 'application/vnd.github+json' };
    if (token()) headers.Authorization = `Bearer ${token()}`;
    const res = await fetch(url, { headers });
    if (!res.ok) throw new Error(`GitHub API ${res.status}`);
    return res.json();
  }

  async function loadRepo() {
    const parsed = parseRepoLike($('repoInput').value);
    if (!parsed) return setStatus('Invalid repo input', 'error');
    setStatus(`Loading ${parsed}...`);
    localStorage.setItem(PAT_KEY, token());
    const [owner, name] = parsed.split('/');
    try {
      const repo = await fetchJson(`https://api.github.com/repos/${owner}/${name}`);
      const branch = repo.default_branch || 'main';
      const tree = await fetchJson(`https://api.github.com/repos/${owner}/${name}/git/trees/${encodeURIComponent(branch)}?recursive=1`);
      const blobs = (tree.tree || []).filter(x => x.type === 'blob');
      const id = new Date().toISOString();
      const pagesPrefix = name.toLowerCase() === `${owner.toLowerCase()}.github.io` ? `https://${owner}.github.io/` : `https://${owner}.github.io/${name}/`;
      const items = blobs.map((b, i) => ({
        id: `${id}:${i}`,
        repoOwner: owner,
        repoName: name,
        branch,
        path: b.path,
        name: b.path.split('/').pop(),
        size: b.size || 0,
        changed: null,
        commitMessage: '',
        pagesUrl: pagesPrefix + encodePath(b.path),
        ghListingUrl: `https://github.com/${owner}/${name}/blob/${branch}/${encodePath(b.path)}`,
        previewUrl: null,
        type: '',
        selected: false,
        closed: false,
        minimized: false,
        tags: [],
        order: i
      }));
      state.collections[id] = { id, name: `${owner}/${name}`, createdAt: new Date().toISOString(), rows: Number($('rowsInput').value)||3, cols: Number($('colsInput').value)||2, search: '', sortBy: 'name', items };
      state.activeId = id;
      $('collectionName').value = state.collections[id].name;
      state.page = 1;
      persist();
      setStatus(`Loaded ${items.length} objects.`, 'ok');
      log(`Loaded repo ${owner}/${name} with ${items.length} objects.`);
      render();
    } catch (e) {
      setStatus(e.message, 'error');
      log(`Repo load failed: ${e.message}`, 'error');
    }
  }

  function addFolderCollection(files) {
    const id = new Date().toISOString();
    const items = Array.from(files).map((f, i) => ({
      id: `${id}:${i}`,
      repoOwner: '', repoName: '', branch: '',
      path: f.webkitRelativePath || f.name,
      name: f.name,
      size: f.size,
      changed: new Date(f.lastModified || Date.now()).toISOString(),
      commitMessage: '',
      pagesUrl: '', ghListingUrl: '',
      previewUrl: URL.createObjectURL(f), type: f.type,
      selected: false, closed: false, minimized: false, tags: [], order: i
    }));
    state.collections[id] = { id, name: `folder-${id.slice(0,10)}`, createdAt: new Date().toISOString(), rows:3, cols:2, search:'', sortBy:'name', items };
    state.activeId = id;
    persist();
    log(`Imported folder with ${items.length} items.`);
    render();
  }

  function parseSearch(q) {
    const terms = String(q || '').trim().split(/\s+/).filter(Boolean);
    const include = [], exclude = [];
    terms.forEach(t => t.startsWith('-') ? exclude.push(t.slice(1)) : include.push(t));
    const toRegex = (t) => new RegExp('^' + t.replace(/[.+?^${}()|[\]\\]/g, '\\$&').replace(/\*/g, '.*') + '$', 'i');
    return {
      incPlain: include.filter(t => !t.includes('*')).map(s => s.toLowerCase()),
      incWild: include.filter(t => t.includes('*')).map(toRegex),
      excPlain: exclude.filter(t => !t.includes('*')).map(s => s.toLowerCase()),
      excWild: exclude.filter(t => t.includes('*')).map(toRegex),
    };
  }

  function filteredItems(c) {
    const { incPlain, incWild, excPlain, excWild } = parseSearch($('searchInput').value);
    let items = c.items.filter(i => !i.closed && !i.minimized);
    items = items.filter(i => {
      const hay = `${i.name} ${i.path} ${i.commitMessage} ${i.size} ${(i.tags||[]).join(' ')}`.toLowerCase();
      const nameHay = `${i.name} ${i.path}`;
      return incPlain.every(t => hay.includes(t)) && incWild.every(rx => rx.test(nameHay)) && excPlain.every(t => !hay.includes(t)) && excWild.every(rx => !rx.test(nameHay));
    });
    const key = $('sortBy').value;
    items.sort((a,b) => {
      const av = key === 'size' ? a.size : (a[key] || '').toString().toLowerCase();
      const bv = key === 'size' ? b.size : (b[key] || '').toString().toLowerCase();
      if (av < bv) return -1; if (av > bv) return 1; return a.order - b.order;
    });
    return items;
  }

  function visibleSlice(c) {
    const items = filteredItems(c);
    const per = Math.max(1, (Number($('rowsInput').value)||1) * (Number($('colsInput').value)||1));
    const maxPage = Math.max(1, Math.ceil(items.length / per));
    if (state.page > maxPage) state.page = maxPage;
    if (state.page < 1) state.page = 1;
    const start = (state.page - 1) * per;
    return { all: items, slice: items.slice(start, start + per), maxPage };
  }

  function renderWorkspace() {
    const c = active();
    workspace.innerHTML = '';
    if (!c) { workspace.innerHTML = '<div class="hint">No collection loaded.</div>'; $('counts').textContent = 'Visible 0 / Selected 0'; return; }
    workspace.style.setProperty('--cols', String(Math.max(1, Number($('colsInput').value)||1)));
    const { all, slice, maxPage } = visibleSlice(c);
    $('pageInfo').textContent = `Page ${state.page}/${maxPage}`;

    slice.forEach(item => workspace.appendChild(renderCard(item)));
    if (!slice.length) workspace.innerHTML = '<div class="hint">No items match filter.</div>';
    const selected = c.items.filter(i => i.selected).length;
    $('counts').textContent = `Visible ${all.length} / Selected ${selected}`;
  }

  function cardPreview(item) {
    const can = item.previewUrl && item.previewUrl.startsWith('blob:');
    if (can && item.type.startsWith('image/')) return `<img src="${item.previewUrl}" alt="">`;
    if (/\.html?$/i.test(item.path)) return `<iframe src="${item.pagesUrl || 'about:blank'}" sandbox="allow-scripts allow-same-origin"></iframe>`;
    return `<div class="hint">Preview unavailable</div>`;
  }

  function renderCard(item) {
    const el = document.createElement('article');
    el.className = `portlet ${item.minimized ? 'minimized':''}`;
    el.innerHTML = `
      <div class="titlebar">
        <input class="sel" type="checkbox" ${item.selected ? 'checked':''} aria-label="select ${item.name}">
        <div class="title" title="${escapeHtml(item.path)}">${escapeHtml(item.name)}</div>
        <div class="actions">
          <button data-open="1">Open</button>
          <button data-min="1">Min</button>
          <button data-remove="1">Rm</button>
        </div>
      </div>
      <div class="content">${cardPreview(item)}</div>
      <div class="meta">
        <div>${escapeHtml(item.path)}</div>
        <div>size: ${item.size || 0}</div>
        <div class="taglist">${(item.tags||[]).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
      </div>`;
    el.querySelector('.sel').addEventListener('change', (e)=> { item.selected = e.target.checked; persist(); renderWorkspace(); });
    el.querySelector('[data-open]').addEventListener('click', ()=> window.open(item.ghListingUrl || item.pagesUrl || '#','_blank','noopener'));
    el.querySelector('[data-min]').addEventListener('click', ()=> { item.minimized = !item.minimized; persist(); render(); });
    el.querySelector('[data-remove]').addEventListener('click', ()=> { item.closed = true; item.selected = false; persist(); render(); });
    return el;
  }

  function renderTrays() {
    const c = active();
    const minList = $('minList'); const remList = $('removedList');
    minList.innerHTML = ''; remList.innerHTML = '';
    if (!c) return;
    c.items.filter(i => i.minimized && !i.closed).forEach(i => {
      const row = document.createElement('div'); row.className='tray-item';
      row.innerHTML = `<span>${escapeHtml(i.name)}</span><button>Restore</button><span></span>`;
      row.querySelector('button').addEventListener('click', ()=> { i.minimized=false; persist(); render(); });
      minList.appendChild(row);
    });
    c.items.filter(i => i.closed).forEach(i => {
      const row = document.createElement('div'); row.className='tray-item';
      row.innerHTML = `<span>${escapeHtml(i.name)}</span><button data-r="1">Restore</button><button data-d="1">Delete</button>`;
      row.querySelector('[data-r]').addEventListener('click', ()=> { i.closed=false; persist(); render(); });
      row.querySelector('[data-d]').addEventListener('click', ()=> { c.items = c.items.filter(x => x.id !== i.id); persist(); render(); });
      remList.appendChild(row);
    });
  }

  function renderPickers() {
    const arr = Object.values(state.collections).sort((a,b) => b.id.localeCompare(a.id));
    $('collectionPicker').innerHTML = arr.map(c => `<option value="${c.id}" ${c.id===state.activeId?'selected':''}>${escapeHtml(c.name)}</option>`).join('');
    $('moveTarget').innerHTML = `<option value="">Move to...</option>` + arr.filter(c => c.id !== state.activeId).map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
    const presets = loadPresets();
    $('presetPicker').innerHTML = `<option value="">Preset...</option>` + presets.map((p, idx) => `<option value="${idx}">${escapeHtml(p.name)}</option>`).join('');
  }

  function renderLog() {
    $('log').innerHTML = state.logs.map(l => `<div class="log-line">[${l.at}] ${escapeHtml(l.level.toUpperCase())}: ${escapeHtml(l.message)}</div>`).join('');
  }

  function render() { renderPickers(); renderWorkspace(); renderTrays(); renderLog(); }

  function snapshot() {
    state.lastBulkSnapshot = {
      collections: JSON.parse(JSON.stringify(state.collections)),
      activeId: state.activeId,
      page: state.page
    };
  }

  function selectedItems() { const c = active(); return c ? c.items.filter(i => i.selected) : []; }

  function selectVisible() { const c = active(); if (!c) return; visibleSlice(c).slice.forEach(i => i.selected = true); persist(); log('Selected visible page items.'); renderWorkspace(); }
  function selectAllResults() { const c = active(); if (!c) return; filteredItems(c).forEach(i => i.selected = true); persist(); log('Selected all search results.'); renderWorkspace(); }
  function clearSelection() { const c = active(); if (!c) return; c.items.forEach(i => i.selected = false); persist(); log('Cleared selection.'); renderWorkspace(); }
  function invertVisible() { const c = active(); if (!c) return; visibleSlice(c).slice.forEach(i => i.selected = !i.selected); persist(); log('Inverted selection on visible page.'); renderWorkspace(); }

  function queueOrRun(fnName, payload) {
    const c = active();
    if (!c) return;
    const ids = selectedItems().map(i => i.id);
    if (!ids.length) return setStatus('No selected items.', 'error');
    if (!navigator.onLine) {
      state.queue.push({
        fnName,
        payload,
        collectionId: state.activeId,
        ids,
        at: new Date().toISOString()
      });
      persist();
      log(`Offline: queued ${fnName} for ${ids.length} items.`, 'warn');
      return;
    }
    return runBulk(fnName, payload, { collectionId: state.activeId, ids });
  }

  async function runBulk(fnName, payload, options = {}) {
    const collectionId = options.collectionId || state.activeId;
    const c = state.collections[collectionId];
    if (!c) return;
    const ids = Array.isArray(options.ids) ? options.ids : selectedItems().map(i => i.id);
    if (!ids.length) return setStatus('No selected items.', 'error');
    snapshot();
    const failures = [];
    for (const id of ids) {
      const item = c.items.find(i => i.id === id);
      if (!item) continue;
      try {
        if (fnName === 'min') item.minimized = !item.minimized;
        if (fnName === 'remove') { item.closed = true; item.selected = false; }
        if (fnName === 'delete') c.items = c.items.filter(i => i.id !== id);
        if (fnName === 'move' || fnName === 'copy') {
          const target = state.collections[payload.targetId];
          if (!target) throw new Error('target missing');
          const clone = JSON.parse(JSON.stringify(item));
          clone.id = `${target.id}:${Date.now()}:${Math.random().toString(16).slice(2)}`;
          clone.selected = false; clone.closed = false; clone.minimized = false;
          target.items.push(clone);
          if (fnName === 'move') item.closed = true;
        }
        if (fnName === 'tag') {
          const tags = payload.tags;
          if (payload.mode === 'replace') item.tags = [...tags];
          else if (payload.mode === 'add') item.tags = [...new Set([...(item.tags||[]), ...tags])];
          else item.tags = (item.tags||[]).filter(t => !tags.includes(t));
        }
      } catch (e) {
        failures.push({ id, message: e.message });
      }
    }
    state.failedItems = failures;
    persist();
    setStatus(`Bulk ${fnName} complete. ${failures.length} failed.`, failures.length ? 'error':'ok');
    log(`Bulk ${fnName} ran on ${ids.length} items with ${failures.length} failures.`, failures.length ? 'warn':'info');
    render();
  }

  function retryFailed() {
    const c = active(); if (!c || !state.failedItems.length) return;
    const ids = state.failedItems.map(f => f.id);
    c.items.forEach(i => { if (ids.includes(i.id)) i.selected = true; });
    log(`Retry selection prepared for ${ids.length} failed items.`);
    render();
  }

  function undoBulk() {
    if (!state.lastBulkSnapshot) return;
    state.collections = JSON.parse(JSON.stringify(state.lastBulkSnapshot.collections));
    state.activeId = state.lastBulkSnapshot.activeId;
    state.page = state.lastBulkSnapshot.page;
    persist();
    log('Undo last bulk action.');
    render();
  }

  function processQueue() {
    if (!navigator.onLine || !state.queue.length) return;
    const q = [...state.queue];
    state.queue = [];
    q.forEach(job => runBulk(job.fnName, job.payload, { collectionId: job.collectionId, ids: job.ids }));
    persist();
    log(`Processed ${q.length} queued actions.`);
  }

  function savePreset() {
    const presets = loadPresets();
    const p = { name: `preset-${new Date().toISOString()}`, moveTarget: $('moveTarget').value, tagMode: $('tagMode').value, tags: parseTags($('tagInput').value) };
    presets.unshift(p);
    localStorage.setItem(PRESET_KEY, JSON.stringify(presets.slice(0, 25)));
    log('Saved bulk preset.');
    renderPickers();
  }

  function runPreset() {
    const selected = $('presetPicker').value;
    if (selected === '') return;
    const idx = Number(selected);
    if (Number.isNaN(idx)) return;
    const preset = loadPresets()[idx];
    if (!preset) return;
    if (preset.tags.length) queueOrRun('tag', { mode: preset.tagMode, tags: preset.tags });
    if (preset.moveTarget) queueOrRun('move', { targetId: preset.moveTarget });
    log(`Ran preset ${preset.name}.`);
  }

  function loadPresets() { try { return JSON.parse(localStorage.getItem(PRESET_KEY) || '[]'); } catch { return []; } }
  function parseTags(v) { return String(v || '').split(',').map(t => t.trim().toLowerCase()).filter(Boolean); }

  function exportLines(filename, lines) {
    const blob = new Blob([lines.join('\n') + '\n'], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 400);
  }

  function exportSelected() {
    const c = active(); if (!c) return;
    const lines = c.items.filter(i => i.selected).map(i => `${i.path}\t${(i.tags||[]).join(',')}`);
    exportLines(`${c.name.replace(/[^a-z0-9-_]+/gi,'_')}_selected.txt`, lines);
    log(`Exported ${lines.length} selected items.`);
  }

  function exportLog() { exportLines('gitview_activity_log.txt', state.logs.map(l => `[${l.at}] ${l.level.toUpperCase()} ${l.message}`)); }

  function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }

  $('loadRepoBtn').addEventListener('click', loadRepo);
  $('folderInput').addEventListener('change', (e) => e.target.files?.length && addFolderCollection(e.target.files));
  $('collectionPicker').addEventListener('change', () => { state.activeId = $('collectionPicker').value; state.page = 1; persist(); render(); });
  $('collectionName').addEventListener('input', () => { const c = active(); if (!c) return; c.name = $('collectionName').value; persist(); renderPickers(); });

  $('searchInput').addEventListener('input', () => { state.page = 1; renderWorkspace(); });
  $('sortBy').addEventListener('change', renderWorkspace);
  $('rowsInput').addEventListener('input', renderWorkspace);
  $('colsInput').addEventListener('input', renderWorkspace);
  $('densityInput').addEventListener('input', () => { const v = Number($('densityInput').value); const base = Number($('colsInput').value)||1; const col = Math.max(1, Math.round(base - (base-1)*(v/100))); workspace.style.setProperty('--cols', String(col)); });
  $('prevPage').addEventListener('click', () => { state.page -= 1; renderWorkspace(); });
  $('nextPage').addEventListener('click', () => { state.page += 1; renderWorkspace(); });

  $('selectVisibleBtn').addEventListener('click', selectVisible);
  $('selectAllResultsBtn').addEventListener('click', selectAllResults);
  $('clearSelectBtn').addEventListener('click', clearSelection);
  $('invertVisibleBtn').addEventListener('click', invertVisible);

  $('bulkMinBtn').addEventListener('click', () => queueOrRun('min', {}));
  $('bulkRemoveBtn').addEventListener('click', () => queueOrRun('remove', {}));
  $('bulkDeleteBtn').addEventListener('click', () => { if (confirm('Delete selected items permanently?')) queueOrRun('delete', {}); });
  $('bulkMoveBtn').addEventListener('click', () => queueOrRun('move', { targetId: $('moveTarget').value }));
  $('bulkCopyBtn').addEventListener('click', () => queueOrRun('copy', { targetId: $('moveTarget').value }));
  $('bulkTagBtn').addEventListener('click', () => queueOrRun('tag', { mode: $('tagMode').value, tags: parseTags($('tagInput').value) }));
  $('retryFailedBtn').addEventListener('click', retryFailed);
  $('undoBtn').addEventListener('click', undoBulk);

  $('savePresetBtn').addEventListener('click', savePreset);
  $('runPresetBtn').addEventListener('click', runPreset);
  $('exportSelectedBtn').addEventListener('click', exportSelected);
  $('exportLogBtn').addEventListener('click', exportLog);

  window.addEventListener('online', processQueue);

  hydrate();
  render();
  processQueue();
})();
</script>
</body>
</html>
