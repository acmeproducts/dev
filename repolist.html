<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repo List</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 20px; }
    .wrap { max-width: 1100px; margin: 0 auto; }
    .row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    input, button { padding: 8px 10px; font-size: 14px; }
    input { min-width: 280px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px; border-bottom: 1px solid #ddd; text-align: left; }
    th { cursor: pointer; user-select: none; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .muted { color: #666; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Repository File List</h1>
    <div class="row">
      <input id="repoInput" placeholder="owner/repo" />
      <button id="loadBtn">Load</button>
    </div>
    <p id="status" class="muted">Ready.</p>
    <table>
      <thead>
        <tr>
          <th data-sort="name">Name</th>
          <th data-sort="date">Date</th>
          <th data-sort="size">Size</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tbody"><tr><td colspan="4" class="muted">No repo loaded.</td></tr></tbody>
    </table>
  </div>

  <script>
    const repoInput = document.getElementById('repoInput');
    const loadBtn = document.getElementById('loadBtn');
    const tbody = document.getElementById('tbody');
    const statusEl = document.getElementById('status');

    let rows = [];
    let sortKey = 'name';
    let sortDir = 'asc';
    let repoCtx = null;

    function setStatus(text, error = false) {
      statusEl.textContent = text;
      statusEl.style.color = error ? '#b91c1c' : '#666';
    }

    function parseRepo(raw) {
      if (!raw) return null;
      const value = raw.trim().replace(/^https?:\/\//i, '').replace(/^www\./i, '');
      if (/^github\.[^/]+\/.+$/i.test(value)) {
        const [owner, repo] = value.replace(/^github\./i, '').split('/');
        return owner && repo ? { owner, repo } : null;
      }
      if (/^github\.com\//i.test(value)) {
        const parts = value.replace(/^github\.com\//i, '').split('/').filter(Boolean);
        return parts.length >= 2 ? { owner: parts[0], repo: parts[1] } : null;
      }
      const parts = value.split('/').filter(Boolean);
      return parts.length >= 2 ? { owner: parts[0], repo: parts[1] } : null;
    }

    function detectRepo() {
      const qp = new URLSearchParams(location.search).get('repo');
      if (qp) return parseRepo(qp);

      const ghPages = location.hostname.match(/^([^.]+)\.github\.io$/i);
      const pathParts = location.pathname.split('/').filter(Boolean);
      if (ghPages && pathParts.length) {
        return { owner: ghPages[1], repo: pathParts[0] };
      }

      if (/^github\.[^.]+$/i.test(location.hostname) && pathParts.length) {
        return { owner: location.hostname.replace(/^github\./i, ''), repo: pathParts[0] };
      }

      if (location.hostname.toLowerCase() === 'github.com' && pathParts.length >= 2) {
        return { owner: pathParts[0], repo: pathParts[1] };
      }

      return null;
    }

    function formatSize(bytes) {
      if (!Number.isFinite(bytes)) return '—';
      if (bytes < 1024) return `${bytes} B`;
      const kb = bytes / 1024;
      if (kb < 1024) return `${kb.toFixed(1)} KB`;
      return `${(kb / 1024).toFixed(1)} MB`;
    }

    function render() {
      rows.sort((a, b) => {
        const dir = sortDir === 'asc' ? 1 : -1;
        if (sortKey === 'size') return ((a.size || 0) - (b.size || 0)) * dir;
        if (sortKey === 'date') {
          return ((new Date(a.date || 0)).valueOf() - (new Date(b.date || 0)).valueOf()) * dir;
        }
        return a.name.localeCompare(b.name) * dir;
      });

      tbody.innerHTML = '';
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="muted">No files found.</td></tr>';
        return;
      }

      const frag = document.createDocumentFragment();
      rows.forEach((r) => {
        const tr = document.createElement('tr');
        const gh = `https://github.com/${repoCtx.owner}/${repoCtx.repo}/blob/${repoCtx.branch}/${encodeURI(r.name)}`;
        const launch = `https://cdn.jsdelivr.net/gh/${repoCtx.owner}/${repoCtx.repo}@${repoCtx.branch}/${encodeURI(r.name)}`;
        tr.innerHTML = `
          <td class="mono">${r.name}</td>
          <td>${r.date ? new Date(r.date).toLocaleString() : '—'}</td>
          <td>${formatSize(r.size)}</td>
          <td><a href="${gh}" target="_blank" rel="noopener">GitHub</a>${/\.html?$/i.test(r.name) ? ` · <a href="${launch}" target="_blank" rel="noopener">Launch</a>` : ''}</td>
        `;
        frag.appendChild(tr);
      });
      tbody.appendChild(frag);
    }

    async function api(url) {
      const res = await fetch(url, { headers: { Accept: 'application/vnd.github+json' } });
      if (!res.ok) throw new Error(`GitHub API ${res.status}`);
      return res.json();
    }

    async function loadRepo(owner, repo) {
      repoCtx = { owner, repo, branch: 'main' };
      setStatus(`Loading ${owner}/${repo}...`);
      tbody.innerHTML = '<tr><td colspan="4" class="muted">Loading...</td></tr>';
      try {
        const info = await api(`https://api.github.com/repos/${owner}/${repo}`);
        repoCtx.branch = info.default_branch || 'main';
        const tree = await api(`https://api.github.com/repos/${owner}/${repo}/git/trees/${repoCtx.branch}?recursive=1`);
        rows = (tree.tree || []).filter((x) => x.type === 'blob').map((x) => ({ name: x.path, size: x.size || null, date: null }));
        render();

        const first = rows.slice(0, 100);
        await Promise.all(first.map(async (file) => {
          try {
            const commits = await api(`https://api.github.com/repos/${owner}/${repo}/commits?path=${encodeURIComponent(file.name).replace(/%2F/g, '/')}&per_page=1`);
            file.date = commits?.[0]?.commit?.committer?.date || null;
          } catch {}
        }));
        render();
        setStatus(`Loaded ${rows.length} files for ${owner}/${repo}.`);
      } catch (err) {
        rows = [];
        render();
        setStatus(`Failed: ${err.message}`, true);
      }
    }

    document.querySelectorAll('th[data-sort]').forEach((th) => {
      th.addEventListener('click', () => {
        const key = th.dataset.sort;
        if (sortKey === key) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        else { sortKey = key; sortDir = key === 'name' ? 'asc' : 'desc'; }
        render();
      });
    });

    loadBtn.addEventListener('click', () => {
      const parsed = parseRepo(repoInput.value);
      if (!parsed) return setStatus('Invalid repo input.', true);
      const url = new URL(location.href);
      url.searchParams.set('repo', `${parsed.owner}/${parsed.repo}`);
      history.replaceState({}, '', url);
      loadRepo(parsed.owner, parsed.repo);
    });

    const initial = detectRepo();
    if (initial) {
      repoInput.value = `${initial.owner}/${initial.repo}`;
      loadRepo(initial.owner, initial.repo);
    }
  </script>
</body>
</html>
